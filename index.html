<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Александр Вечеров</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0a0a; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; color:#fff; -webkit-font-smoothing:antialiased; }
button { background:none; border:none; cursor:pointer; font-family:inherit; color:inherit; }
a { color:inherit; text-decoration:none; }
img { display:block; }

.view { position:fixed; inset:0; display:none; flex-direction:column; }
.view.active { display:flex; }

/* ══════════════════════════════════════
   HOME
══════════════════════════════════════ */
#view-home { overflow:hidden; }
.home-bg { position:absolute; inset:0; background:#111; }
.home-bg img { width:100%; height:100%; object-fit:cover; }
.home-bg-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:11px; letter-spacing:.2em; color:rgba(255,255,255,.1); text-transform:uppercase; }
.home-ui { position:absolute; inset:0; z-index:5; }
.home-top { display:flex; justify-content:space-between; align-items:flex-start; padding:28px 32px; }
.artist-name { font-size:13px; font-weight:300; letter-spacing:.22em; line-height:1.55; text-transform:uppercase; }
.dots-btn { display:flex; flex-direction:column; gap:5px; padding:2px; }
.dots-btn span { display:block; width:4px; height:4px; background:#fff; }
.home-upload { position:absolute; bottom:32px; left:50%; transform:translateX(-50%); z-index:10; }
.home-upload label { display:block; cursor:pointer; font-size:10px; font-weight:300; letter-spacing:.2em; text-transform:uppercase; border:1px solid rgba(255,255,255,.22); padding:9px 22px; background:rgba(0,0,0,.4); white-space:nowrap; color:#fff; }
#inp-home { position:absolute; left:-9999px; opacity:0; width:1px; height:1px; }

/* ══════════════════════════════════════
   MENU
   макет desctop_2:
   — blur + tint ТОЛЬКО на правой панели, не на весь экран
   — левая часть экрана остаётся видна с фото
   — панель выезжает справа за 0.7s
   — пункты вверху, right-align
   — иконки внизу
══════════════════════════════════════ */
.menu-ov { position:fixed; inset:0; z-index:200; pointer-events:none; }
.menu-ov.open { pointer-events:all; }

/* полупрозрачный overlay только для клика вне панели — без blur */
.menu-dismiss { position:absolute; inset:0; }

.menu-panel {
  position:absolute; top:0; right:0; bottom:0;
  width:clamp(280px,42vw,520px);
  display:flex; flex-direction:column;
  padding:52px 48px 48px 40px;
  /* blur и tint ТОЛЬКО на панели */
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  background:rgba(0,0,0,.73);
  transform:translateX(100%);
  transition:transform .7s cubic-bezier(.4,0,.2,1);
}
.menu-ov.open .menu-panel { transform:translateX(0); }

.menu-nav { display:flex; flex-direction:column; justify-content:flex-start; align-items:flex-end; flex:1; }
.menu-item { font-size:clamp(13px,1.35vw,16px); font-weight:300; letter-spacing:.3em; text-transform:lowercase; text-align:right; padding:16px 0; line-height:1.3; cursor:pointer; transition:opacity .2s; width:100%; }
.menu-item:hover { opacity:.5; }
.menu-line { height:1px; background:rgba(255,255,255,.15); width:25%; margin:14px 0 14px auto; }
.menu-sub { font-size:clamp(11px,1.1vw,13px); font-weight:100; letter-spacing:.3em; text-transform:lowercase; text-align:right; padding:13px 0; cursor:pointer; transition:opacity .2s; width:100%; }
.menu-sub:hover { opacity:.5; }
.menu-icons { display:flex; justify-content:flex-end; gap:22px; margin-top:auto; padding-top:32px; }
.menu-icons a { opacity:.65; transition:opacity .2s; }
.menu-icons a:hover { opacity:1; }
.menu-icons img { width:22px; height:22px; object-fit:contain; filter:invert(1); }

@media (max-width:768px) {
  .menu-panel { width:100%; padding:52px 32px 44px; }
}

/* ══════════════════════════════════════
   SECTION VIEW
   макет desctop_3 / mobile_3

   ДЕСКТОП:
   ┌──────────────────────────────────────────┐
   │ TOPBAR [<назад] [вектор-маска] [хрон][ИМЯ] │
   ├──────────────────┬───────────────────────┤
   │ SCROLL (artworks)│ DESC PANEL (→ выезжает)│
   └──────────────────┴───────────────────────┘

   MOBILE:
   ┌──────────────────────────────────────────┐
   │ TOPBAR [<] [ИМЯ]                         │
   │         хронология →                     │
   ├──────────────────────────────────────────┤
   │ DESC (выезжает ВНИЗ со шторкой)          │
   ├──────────────────────────────────────────┤
   │ SCROLL                                   │
   └──────────────────────────────────────────┘
══════════════════════════════════════ */
#view-section { position:relative; overflow:hidden; background:#0a0a0a; }

.sec-bg { position:absolute; inset:0; z-index:0; overflow:hidden; }
.sec-bg-img { position:absolute; inset:-8%; background:center/cover no-repeat; filter:blur(18px); transform:scale(1.15); }
.sec-bg-dim { position:absolute; inset:0; background:rgba(0,0,0,.90); }

/* ── TOPBAR ──
   Содержит: [< назад] | [вектор с маской] | [хронология] [НАЗВАНИЕ]
   Вектор: position:absolute left, clip-path обрезает его
   так чтобы он занимал 1/5 ширины топбара
*/
.sec-topbar {
  position:relative; z-index:20; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 36px;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  overflow:hidden; /* обрезает вектор */
  min-height:64px;
}

/* декоративный вектор в топбаре:
   position:absolute, левый угол, 1/5 экрана по ширине,
   обрезан clip-path чтобы не мешать кнопкам */
.sec-topbar-vec {
  position:absolute; left:0; top:0; bottom:0;
  width:20vw; max-width:200px;
  display:flex; align-items:center;
  pointer-events:none; z-index:0;
  opacity:0;
  transition:opacity .5s ease;
}
.sec-topbar-vec img {
  width:100%; height:100%;
  object-fit:contain; object-position:left center;
  /* clip: показываем только левую часть, постепенно раскрывается */
}
/* когда описание открыто — вектор появляется */
.sec-topbar-vec.visible { opacity:1; }

.sec-back { position:relative; z-index:1; font-size:13px; font-weight:500; letter-spacing:.06em; white-space:nowrap; flex-shrink:0; }
.sec-topbar-right { position:relative; z-index:1; display:flex; align-items:center; gap:28px; flex-shrink:0; }
.sec-chrono { font-size:10pt; font-weight:300; letter-spacing:.3em; text-transform:lowercase; transition:opacity .2s; }
.sec-chrono:hover, .sec-chrono.on { opacity:.45; }
.sec-titleBtn { font-size:10pt; font-weight:700; letter-spacing:.3em; text-transform:lowercase; transition:opacity .2s; }
.sec-titleBtn:hover { opacity:.7; }

/* mobile: хронология строкой */
.chrono-row {
  display:none; position:relative; z-index:20; flex-shrink:0;
  justify-content:flex-end; padding:0 36px 12px;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
}
@media (max-width:768px) {
  .sec-topbar { padding:16px 20px; overflow:hidden; }
  .sec-topbar .sec-chrono { display:none; }
  .chrono-row { display:flex !important; padding:0 20px 10px; }
  .sec-topbar-vec { width:40vw; max-width:none; }
}

/* ── BODY: scroll + desc side by side (desktop) ── */
.sec-body {
  position:relative; z-index:10;
  flex:1; display:flex; overflow:hidden;
}

/* SCROLL — лента артворков */
.sec-scroll {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:20px 36px 60px;
  transition:flex .45s cubic-bezier(.4,0,.2,1);
}
@media (max-width:768px) { .sec-scroll { padding:14px 20px 80px; } }

/* DESC PANEL — десктоп: выезжает СПРАВА */
.sec-desc {
  /* ширина 0 когда закрыта, раскрывается */
  width:0; overflow:hidden; flex-shrink:0;
  transition:width .5s cubic-bezier(.4,0,.2,1);
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
}
.sec-desc.open { width:clamp(240px,30vw,380px); }

.sec-desc-inner {
  width:clamp(240px,30vw,380px);
  padding:20px 24px 24px 20px;
  overflow-y:auto; height:100%;
}
.sec-desc-inner p { font-size:9pt; font-weight:300; letter-spacing:.08em; line-height:1.75; color:rgba(255,255,255,.8); text-align:justify; }
.sec-desc-inner p+p { margin-top:10px; }

/* MOBILE: desc выезжает СНИЗУ */
@media (max-width:768px) {
  .sec-body { flex-direction:column; }
  .sec-desc {
    width:100% !important;
    height:0; overflow:hidden;
    transition:height .5s cubic-bezier(.4,0,.2,1);
    order:-1; /* над лентой */
  }
  .sec-desc.open { height:auto; max-height:50vh; }
  .sec-desc-inner { width:100%; height:auto; max-height:50vh; padding:16px 20px 12px; }
}

.desc-close-mob {
  display:none; width:100%; text-align:center;
  padding:6px 0; cursor:pointer; font-size:18px; color:rgba(255,255,255,.3);
  background:rgba(0,0,0,.82); flex-shrink:0;
}
@media (max-width:768px) { .desc-close-mob { display:block; } }

/* ── ARTWORK CARD ──
   Изображение: не на весь экран, с отступами
   При открытом описании — сужается ещё
*/
.art-card { margin-top:28px; }

/* carousel-обёртка */
.art-carousel { position:relative; overflow:hidden; }
.art-track { display:flex; transition:transform .4s ease; }
.art-slide img {
  /* ширина = 100% контейнера, height auto — не растягиваем */
  width:100%; display:block; cursor:pointer;
}
.art-dots { display:flex; gap:5px; margin-top:8px; }
.art-dot { width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,.25); cursor:pointer; transition:background .2s; }
.art-dot.on { background:rgba(255,255,255,.8); }

/* info под фото */
.art-info { margin-top:14px; }
.art-title { font-size:18px; font-weight:400; letter-spacing:.1em; color:#eef3f6; line-height:1.3; }
.art-mat { margin-top:8px; font-size:9px; font-weight:400; letter-spacing:.1em; color:#9b9b9b; line-height:1.35; }
.art-year { margin-top:5px; font-size:9px; font-weight:400; letter-spacing:.1em; color:#9b9b9b; }
.art-price { margin-top:10px; font-size:15px; font-weight:400; letter-spacing:.06em; color:#2d2d2d; }

/* temp upload */
.art-upload { margin-bottom:4px; }
.art-upload label { display:inline-block; cursor:pointer; font-size:9px; font-weight:300; letter-spacing:.2em; text-transform:uppercase; border:1px solid rgba(255,255,255,.15); padding:7px 16px; background:rgba(255,255,255,.03); color:#fff; }
#inp-art { position:absolute; left:-9999px; opacity:0; width:1px; height:1px; }

/* ══════════════════════════════════════
   TEXT VIEW
══════════════════════════════════════ */
#view-text { background:#0a0a0a; }
.text-top { flex-shrink:0; display:flex; align-items:baseline; justify-content:space-between; padding:28px 48px; }
.text-ttl { font-size:13px; font-weight:100; letter-spacing:.3em; text-transform:lowercase; }
.text-body { flex:1; overflow-y:auto; padding:36px 10vw 60px; }
.text-body p { font-size:13px; font-weight:300; letter-spacing:.05em; line-height:1.85; color:rgba(255,255,255,.88); text-align:justify; text-indent:2em; }
@media (max-width:768px) { .text-top { padding:20px 24px; } .text-body { padding:24px 24px 60px; } }

/* ══════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════ */
.lb { position:fixed; inset:0; z-index:500; display:none; align-items:center; justify-content:center; }
.lb.open { display:flex; }
.lb-bg { position:absolute; inset:0; cursor:pointer; backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); background:rgba(0,0,0,.85); }
.lb-stage { position:relative; z-index:1; }
.lb-track { display:flex; transition:transform .4s ease; }
.lb-slide img { max-width:calc(100vw - 80px); max-height:calc(100vh - 80px); object-fit:contain; }
@media (max-width:768px) { .lb-slide img { max-width:calc(100vw - 48px); } }
.lb-arr { position:absolute; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.1); font-size:22px; display:flex; align-items:center; justify-content:center; z-index:2; }
.lb-arr:hover { background:rgba(255,255,255,.25); }
.lb-prv { left:-52px; } .lb-nxt { right:-52px; }
@media (max-width:768px) { .lb-prv { left:-28px; } .lb-nxt { right:-28px; } }
.lb-dots { position:absolute; bottom:-28px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
.lb-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; }
.lb-dot.on { background:rgba(255,255,255,.9); }

::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); }
</style>
</head>
<body>

<!-- HOME -->
<div id="view-home" class="view active">
  <div class="home-bg" id="home-bg">
    <div class="home-bg-ph" id="home-ph">загрузите фото</div>
  </div>
  <div class="home-ui">
    <div class="home-top">
      <div class="artist-name">Александр<br>Вечеров</div>
      <button class="dots-btn" id="btn-menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="home-upload">
    <label for="inp-home">загрузить фото главной</label>
    <input type="file" id="inp-home" accept="image/*">
  </div>
</div>

<!-- MENU -->
<div class="menu-ov" id="menu-ov">
  <div class="menu-dismiss" id="menu-dismiss"></div>
  <div class="menu-panel" id="menu-panel">
    <nav class="menu-nav">
      <div class="menu-item" data-sec="branching">код ветвления</div>
      <div class="menu-item" data-sec="metaphysics">метафизика<br>повседневности</div>
      <div class="menu-item" data-sec="digital">цифровые работы</div>
      <div class="menu-item" data-sec="jewelry">ювелирные<br>изделия</div>
      <div class="menu-line"></div>
      <div class="menu-sub" data-page="bio">bio</div>
      <div class="menu-sub" data-page="statement">artist statement</div>
    </nav>
    <div class="menu-icons">
      <a href="mailto:eveningoff16@gmail.com"><img src="assets/mail_icon.png" onerror="this.closest('a').style.display='none'" alt=""></a>
      <a href="https://t.me/eveningoff" target="_blank"><img src="assets/telegram_icon.png" onerror="this.closest('a').style.display='none'" alt=""></a>
      <a href="https://instagram.com/eveningoff" target="_blank"><img src="assets/instagram_icon.png" onerror="this.closest('a').style.display='none'" alt=""></a>
    </div>
  </div>
</div>

<!-- SECTION -->
<div id="view-section" class="view">

  <div class="sec-bg">
    <div class="sec-bg-img" id="sec-bg-img"></div>
    <div class="sec-bg-dim"></div>
  </div>

  <!-- TOPBAR -->
  <div class="sec-topbar">
    <!-- вектор в левом углу, обрезан overflow:hidden топбара -->
    <div class="sec-topbar-vec" id="sec-topbar-vec">
      <img id="sec-topbar-vec-img" src="" alt="" onerror="this.style.display='none'">
    </div>
    <button class="sec-back" id="sec-back">< назад</button>
    <div class="sec-topbar-right">
      <button class="sec-chrono" id="sec-chrono">хронология</button>
      <button class="sec-titleBtn" id="sec-titleBtn"></button>
    </div>
  </div>

  <!-- mobile: хронология строкой -->
  <div class="chrono-row">
    <button class="sec-chrono" id="sec-chrono-m">хронология</button>
  </div>

  <!-- body: scroll + desc -->
  <div class="sec-body">

    <!-- лента артворков -->
    <div class="sec-scroll" id="sec-scroll">
      <div class="art-upload">
        <label for="inp-art">+ загрузить изображение</label>
        <input type="file" id="inp-art" accept="image/*" multiple>
      </div>
      <div id="art-list"></div>
    </div>

    <!-- desc panel: десктоп — справа, mobile — сверху над лентой -->
    <div class="sec-desc" id="sec-desc">
      <div class="sec-desc-inner" id="sec-desc-inner"></div>
      <button class="desc-close-mob" id="desc-close">&#94;</button>
    </div>

  </div>

</div>

<!-- TEXT -->
<div id="view-text" class="view">
  <div class="text-top">
    <button class="sec-back" id="text-back">< назад</button>
    <div class="text-ttl" id="text-ttl"></div>
  </div>
  <div class="text-body" id="text-body"></div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb">
  <div class="lb-bg" id="lb-bg"></div>
  <div class="lb-stage" id="lb-stage">
    <div class="lb-track" id="lb-track"></div>
    <button class="lb-arr lb-prv" id="lb-prv">&#8249;</button>
    <button class="lb-arr lb-nxt" id="lb-nxt">&#8250;</button>
    <div class="lb-dots" id="lb-dots"></div>
  </div>
</div>

<script>
/* ══ DATA ══ */
const SEC = {
  branching:{ title:'код ветвления', vec:'assets/puzzle.png',
    desc:'Этот раздел посвящён структурным принципам жизни.\nЯ рассматриваю жизнь как систему связей, в которой каждое действие опирается на предыдущее и формирует последующее.\n\nВ своей работе я обращаюсь к двум способам организации: древовидному и ризоматическому. Первый предполагает иерархию и направленный рост, второй — множественность связей и отсутствие единого центра.\n\nВ реальности эти принципы накладываются друг на друга, формируя сеть пересечений.', arts:[] },
  metaphysics:{ title:'метафизика повседневности', vec:'assets/moth_circle.png', desc:'В этом разделе исследуется скрытое измерение обыденного.\nКаждый предмет, жест, взгляд несёт в себе след более глубоких структур.', arts:[] },
  digital:{ title:'цифровые работы', vec:'assets/dragons.png', desc:'Цифровые практики как расширение традиционных. Инструмент меняется — вопрос остаётся прежним.', arts:[] },
  jewelry:{ title:'ювелирные изделия', vec:null, desc:'Ювелирное ремесло как форма концептуального высказывания.', arts:[] }
};
const PG = {
  bio:{ title:'bio', text:'Александр Вечеров — художник, работающий на пересечении концептуального реализма и сюрреализма.\n\nОсновные медиумы: живопись, графика, ленд-арт, керамическая скульптура, ювелирное ремесло и текстиль.\n\nУчастник выставок. Работы находятся в частных коллекциях.' },
  statement:{ title:'artist statement', text:'Я работаю в жанре концептуального реализма с элементами сюрреализма. Этот подход представляется мне наиболее точным инструментом для акцентирования внимания на скрытых механизмах и мистических проявлениях реальности.\n\nТрадиционные техники и материалы привлекают меня своей каноничностью, поскольку позволяют говорить о фундаментальных процессах, опираясь на доступные для восприятия образы.\n\nВ своём творчестве я исследую структуру жизни и принципы её организации.\n\nРабота начинается с идеи, фиксируется в эскизе и продолжается через многократный поиск композиционных решений.\n\nЯ воспринимаю художественную практику как способ фиксации и исследования невидимых связей, формирующих наше существование.' }
};

let cur=null, descOpen=false, rev=false, lbArr=[], lbI=0;
const isMob = () => window.innerWidth <= 768;

const show = id => {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
};

/* ── HOME ── */
document.getElementById('inp-home').addEventListener('change', function() {
  const f = this.files[0]; if (!f) return;
  const url = URL.createObjectURL(f);
  document.getElementById('home-ph').style.display = 'none';
  const bg = document.getElementById('home-bg');
  let img = bg.querySelector('img');
  if (!img) { img = document.createElement('img'); bg.prepend(img); }
  img.src = url;
  document.getElementById('sec-bg-img').style.backgroundImage = `url('${url}')`;
});

/* ── MENU ── */
const mOv = document.getElementById('menu-ov');
document.getElementById('btn-menu').addEventListener('click', () => mOv.classList.add('open'));
document.getElementById('menu-dismiss').addEventListener('click', e => {
  if (!e.target.closest('.menu-panel')) mOv.classList.remove('open');
});
// свайп вправо — закрыть
let swX = null;
document.getElementById('menu-panel').addEventListener('touchstart', e => { swX = e.touches[0].clientX; }, { passive:true });
document.getElementById('menu-panel').addEventListener('touchend', e => {
  if (swX === null) return;
  if (e.changedTouches[0].clientX - swX > 60) mOv.classList.remove('open');
  swX = null;
}, { passive:true });

document.querySelectorAll('.menu-item').forEach(el => el.addEventListener('click', () => {
  mOv.classList.remove('open');
  setTimeout(() => openSec(el.dataset.sec), 80);
}));
document.querySelectorAll('.menu-sub').forEach(el => el.addEventListener('click', () => {
  mOv.classList.remove('open');
  setTimeout(() => openPg(el.dataset.page), 80);
}));

/* ── SECTION ── */
function openSec(key) {
  cur = key; descOpen = false; rev = false;
  const s = SEC[key];

  document.getElementById('sec-titleBtn').textContent = s.title;
  document.getElementById('sec-back').textContent = isMob() ? '<' : '< назад';

  // вектор в топбаре
  const vecWrap = document.getElementById('sec-topbar-vec');
  const vecImg  = document.getElementById('sec-topbar-vec-img');
  if (s.vec) { vecImg.src = s.vec; vecImg.style.display = 'block'; }
  else { vecImg.style.display = 'none'; }
  vecWrap.classList.remove('visible'); // скрыт пока описание закрыто

  // фон
  const fi = s.arts[0]?.images[0];
  if (fi) document.getElementById('sec-bg-img').style.backgroundImage = `url('${fi}')`;

  // описание
  document.getElementById('sec-desc-inner').innerHTML =
    s.desc.split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');

  document.getElementById('sec-desc').classList.remove('open');
  document.getElementById('sec-chrono').classList.remove('on');
  document.getElementById('sec-chrono-m').classList.remove('on');

  renderArts();
  show('section');
}

window.addEventListener('resize', () => {
  if (cur) document.getElementById('sec-back').textContent = isMob() ? '<' : '< назад';
});

function setDesc(open) {
  descOpen = open;
  document.getElementById('sec-desc').classList.toggle('open', open);
  // вектор появляется вместе с описанием
  document.getElementById('sec-topbar-vec').classList.toggle('visible', open);
}

document.getElementById('sec-titleBtn').addEventListener('click', () => setDesc(!descOpen));
document.getElementById('desc-close').addEventListener('click', () => setDesc(false));

// свайп вниз — закрыть desc (mobile)
let dsY = null;
document.getElementById('sec-desc').addEventListener('touchstart', e => { dsY = e.touches[0].clientY; }, { passive:true });
document.getElementById('sec-desc').addEventListener('touchend', e => {
  if (dsY === null) return;
  if (e.changedTouches[0].clientY - dsY > 50) setDesc(false);
  dsY = null;
}, { passive:true });

function togChrono() {
  rev = !rev;
  document.getElementById('sec-chrono').classList.toggle('on', rev);
  document.getElementById('sec-chrono-m').classList.toggle('on', rev);
  renderArts();
}
document.getElementById('sec-chrono').addEventListener('click', togChrono);
document.getElementById('sec-chrono-m').addEventListener('click', togChrono);
document.getElementById('sec-back').addEventListener('click', () => show('home'));

/* artwork upload */
document.getElementById('inp-art').addEventListener('change', function() {
  if (!cur) return;
  const images = Array.from(this.files).map(f => URL.createObjectURL(f));
  // добавляем как одну карточку с несколькими изображениями (карусель)
  SEC[cur].arts.push({
    images,
    title: null, material: null, size: null, year: null, price: null
  });
  renderArts();
  const fi = SEC[cur].arts[0]?.images[0];
  if (fi) document.getElementById('sec-bg-img').style.backgroundImage = `url('${fi}')`;
  this.value = '';
});

function renderArts() {
  const arr = rev ? [...SEC[cur].arts].reverse() : SEC[cur].arts;
  const list = document.getElementById('art-list');
  list.innerHTML = '';
  arr.forEach((art, ai) => {
    const card = document.createElement('div');
    card.className = 'art-card';

    // карусель изображений
    if (art.images?.length) {
      const carousel = document.createElement('div');
      carousel.className = 'art-carousel';

      const track = document.createElement('div');
      track.className = 'art-track';

      art.images.forEach((src, si) => {
        const slide = document.createElement('div');
        slide.className = 'art-slide';
        slide.style.minWidth = '100%';
        const img = document.createElement('img');
        img.src = src;
        img.addEventListener('click', () => openLB(art.images, si));
        slide.appendChild(img);
        track.appendChild(slide);
      });
      carousel.appendChild(track);

      // dots навигация (если > 1 фото)
      let dotsEl = null;
      if (art.images.length > 1) {
        dotsEl = document.createElement('div');
        dotsEl.className = 'art-dots';
        art.images.forEach((_, i) => {
          const d = document.createElement('div');
          d.className = 'art-dot' + (i === 0 ? ' on' : '');
          d.addEventListener('click', () => goArtSlide(track, dotsEl, i));
          dotsEl.appendChild(d);
        });
        carousel.appendChild(dotsEl);
      }

      // свайп по карусели
      let tx = null;
      let curSlide = 0;
      carousel.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive:true });
      carousel.addEventListener('touchend', e => {
        if (tx === null) return;
        const dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) > 40) {
          curSlide = Math.max(0, Math.min(curSlide + (dx < 0 ? 1 : -1), art.images.length - 1));
          goArtSlide(track, dotsEl, curSlide);
        }
        tx = null;
      }, { passive:true });

      card.appendChild(carousel);
    }

    // инфо о работе
    const info = document.createElement('div');
    info.className = 'art-info';
    if (art.title) {
      const t = document.createElement('div'); t.className = 'art-title'; t.textContent = art.title;
      info.appendChild(t);
    }
    if (art.material || art.size) {
      const m = document.createElement('div'); m.className = 'art-mat';
      let h = ''; if (art.material) h += art.material; if (art.size) h += (art.material ? '<br>' : '') + art.size;
      m.innerHTML = h; info.appendChild(m);
    }
    if (art.year) {
      const y = document.createElement('div'); y.className = 'art-year'; y.textContent = art.year;
      info.appendChild(y);
    }
    if (art.price) {
      const p = document.createElement('div'); p.className = 'art-price'; p.textContent = art.price;
      info.appendChild(p);
    }
    card.appendChild(info);
    list.appendChild(card);
  });
}

function goArtSlide(track, dotsEl, idx) {
  const slides = track.querySelectorAll('.art-slide');
  const w = slides[0]?.offsetWidth || track.parentElement.offsetWidth;
  track.style.transform = `translateX(${-idx * w}px)`;
  if (dotsEl) dotsEl.querySelectorAll('.art-dot').forEach((d, i) => d.classList.toggle('on', i === idx));
}

/* ── TEXT ── */
function openPg(key) {
  const p = PG[key];
  document.getElementById('text-ttl').textContent = p.title;
  document.getElementById('text-body').innerHTML = p.text.split('\n\n').map(t => `<p>${t}</p>`).join('');
  show('text');
}
document.getElementById('text-back').addEventListener('click', () => show('home'));

/* ── LIGHTBOX ── */
function openLB(imgs, idx) {
  lbArr = imgs; lbI = idx;
  const tr = document.getElementById('lb-track'); tr.innerHTML = '';
  imgs.forEach(src => {
    const s = document.createElement('div'); s.className = 'lb-slide';
    const i = document.createElement('img'); i.src = src;
    s.appendChild(i); tr.appendChild(s);
  });
  const dots = document.getElementById('lb-dots'); dots.innerHTML = '';
  if (imgs.length > 1) imgs.forEach((_, i) => {
    const d = document.createElement('div'); d.className = 'lb-dot' + (i === 0 ? ' on' : '');
    d.addEventListener('click', () => goLB(i)); dots.appendChild(d);
  });
  document.getElementById('lb-prv').style.display = imgs.length > 1 ? '' : 'none';
  document.getElementById('lb-nxt').style.display = imgs.length > 1 ? '' : 'none';
  updLB();
  document.getElementById('lb').classList.add('open');
}
const closeLB = () => document.getElementById('lb').classList.remove('open');
function goLB(i) { lbI = Math.max(0, Math.min(i, lbArr.length - 1)); updLB(); }
function updLB() {
  const sl = document.querySelectorAll('.lb-slide'); if (!sl.length) return;
  const w = sl[0].offsetWidth || (window.innerWidth - 80);
  document.getElementById('lb-track').style.transform = `translateX(${-lbI * w}px)`;
  document.querySelectorAll('.lb-dot').forEach((d, i) => d.classList.toggle('on', i === lbI));
}
document.getElementById('lb-bg').addEventListener('click', closeLB);
document.getElementById('lb-prv').addEventListener('click', e => { e.stopPropagation(); goLB(lbI - 1); });
document.getElementById('lb-nxt').addEventListener('click', e => { e.stopPropagation(); goLB(lbI + 1); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') goLB(lbI - 1);
  if (e.key === 'ArrowRight') goLB(lbI + 1);
  if (e.key === 'Escape') closeLB();
});
let ltx = null;
document.getElementById('lb-stage').addEventListener('touchstart', e => { ltx = e.touches[0].clientX; }, { passive:true });
document.getElementById('lb-stage').addEventListener('touchend', e => {
  if (ltx === null) return;
  const dx = e.changedTouches[0].clientX - ltx;
  if (Math.abs(dx) > 40) dx < 0 ? goLB(lbI + 1) : goLB(lbI - 1);
  ltx = null;
}, { passive:true });

/* ── PINCH ZOOM (mobile) ── */
(function() {
  let el=null, sc=1, px=0, py=0, ld=0, lx=0, ly=0, lt=0;
  const rst = () => {
    if (!el) return;
    el.style.transform = ''; el.style.zIndex = ''; el.style.position = '';
    el = null; sc = 1; px = 0; py = 0;
  };
  document.addEventListener('touchstart', e => {
    if (window.innerWidth > 768) return;
    const t = e.target.closest('.art-slide img');
    if (!t) return;
    if (e.touches.length === 2) {
      el = t;
      ld = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    }
    if (e.touches.length === 1) { lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
    const now = Date.now();
    if (now - lt < 280 && sc > 1) rst();
    lt = now;
  }, { passive:true });
  document.addEventListener('touchmove', e => {
    if (!el) return;
    if (e.touches.length === 2) {
      e.preventDefault();
      const d = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
      sc = Math.max(1, Math.min(sc * (d / ld), 4)); ld = d;
    } else if (e.touches.length === 1 && sc > 1) {
      e.preventDefault();
      px += e.touches[0].clientX - lx; py += e.touches[0].clientY - ly;
      lx = e.touches[0].clientX; ly = e.touches[0].clientY;
    }
    el.style.transform = `scale(${sc}) translate(${px/sc}px,${py/sc}px)`;
    el.style.transformOrigin = 'center center';
    el.style.position = 'relative'; el.style.zIndex = '30';
  }, { passive:false });
  document.addEventListener('touchend', e => {
    if (!el) return;
    if (e.touches.length === 0 && sc <= 1.05) rst();
  }, { passive:true });
})();

show('home');
</script>
