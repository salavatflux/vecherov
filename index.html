<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Александр Вечеров</title>
<link rel="icon" type="image/png" href="assets/puzzle.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0a0a; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; color:#fff; -webkit-font-smoothing:antialiased; }
button { background:none; border:none; cursor:pointer; font-family:inherit; color:inherit; }
a { color:inherit; text-decoration:none; }
img { display:block; max-width:100%; }

.view { position:fixed; inset:0; display:none; }
.view.active { display:flex; flex-direction:column; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#view-section.active, #view-text.active { animation:fadeIn .5s ease both; }

/* ── HOME ── */
#view-home { overflow:hidden; }
.home-bg { position:absolute; inset:0; background:#111; }
.home-bg img { width:100%; height:100%; object-fit:cover; }
.home-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:11px; letter-spacing:.2em; color:rgba(255,255,255,.1); text-transform:uppercase; }
.home-ui { position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; }
.home-top { display:flex; justify-content:space-between; align-items:flex-start; padding:28px 32px; }
.artist-name { font-size:clamp(16px,1.8vw,24px); font-weight:300; letter-spacing:.22em; line-height:1.3; text-transform:uppercase; }
.dots-btn { display:flex; flex-direction:column; gap:5px; padding:2px; }
.dots-btn span { display:block; width:4px; height:4px; background:#fff; }

/* ── MENU ── */
.menu-ov { position:fixed; inset:0; z-index:200; pointer-events:none; }
.menu-ov.open { pointer-events:all; }
.menu-dismiss { position:absolute; inset:0; background:rgba(0,0,0,0); transition:background .7s; }
.menu-ov.open .menu-dismiss { background:rgba(0,0,0,.3); }
.menu-panel {
  position:absolute; top:0; right:0; bottom:0;
  width:clamp(280px,42vw,520px);
  display:flex; flex-direction:column;
  padding:52px 48px 48px 40px;
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  background:rgba(0,0,0,.73);
  transform:translateX(100%);
  transition:transform .7s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.menu-ov.open .menu-panel { transform:translateX(0); }
@keyframes menuIn { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }
.menu-ov.open .menu-item:nth-child(1){animation:menuIn .6s .08s both}
.menu-ov.open .menu-item:nth-child(2){animation:menuIn .6s .15s both}
.menu-ov.open .menu-item:nth-child(3){animation:menuIn .6s .22s both}
.menu-ov.open .menu-item:nth-child(4){animation:menuIn .6s .29s both}
.menu-ov.open .menu-item:nth-child(5){animation:menuIn .6s .36s both}
.menu-ov.open .menu-item:nth-child(6){animation:menuIn .6s .43s both}
.menu-ov.open .menu-line{animation:menuIn .6s .48s both}
.menu-ov.open .menu-sub:nth-child(1){animation:menuIn .6s .53s both}
.menu-ov.open .menu-sub:nth-child(2){animation:menuIn .6s .58s both}
.menu-ov.open .menu-icons{animation:menuIn .6s .63s both}
.menu-nav { flex:1; display:flex; flex-direction:column; justify-content:flex-start; align-items:flex-end; }
.menu-item { font-size:clamp(16px,1.8vw,22px); font-weight:300; letter-spacing:.3em; text-transform:lowercase; text-align:right; padding:16px 0; line-height:1.3; cursor:pointer; transition:opacity .2s; width:100%; }
.menu-item:hover { opacity:.5; }
.menu-line { height:1px; background:rgba(255,255,255,.15); width:25%; margin:12px 0 12px auto; }
.menu-sub { font-size:clamp(16px,1.8vw,22px); font-weight:100; letter-spacing:.3em; text-transform:lowercase; text-align:right; padding:16px 0; cursor:pointer; transition:opacity .2s; width:100%; }
.menu-sub:hover { opacity:.5; }
.menu-icons { display:flex; justify-content:flex-end; gap:22px; margin-top:auto; padding-top:32px; }
.menu-icons a { opacity:.65; transition:opacity .2s; color:#fff; display:flex; }
.menu-icons a:hover { opacity:1; }
.menu-icons svg { width:22px; height:22px; }
@media(max-width:768px){ .menu-panel{width:100%;padding:52px 32px 44px} }

/* ── SECTION ── */
#view-section { background:#0a0a0a; overflow:hidden; }
.sec-bg { position:absolute; inset:0; z-index:0; overflow:hidden; background:#0a0a0a; }
.sec-bg-img { position:absolute; inset:-5%; background-size:cover; background-position:center; filter:blur(20px); transform:scale(1.1); opacity:0; transition:opacity .5s; }
.sec-bg-img.loaded { opacity:1; }
.sec-bg-dim { position:absolute; inset:0; background:rgba(0,0,0,.75); }

/*
  Топбар: содержит вектор (z-index:0) и кнопки (z-index:1).
  overflow:hidden обрезает вектор снизу и по бокам.

  Вектор (.sec-vec):
  — position:absolute, left:-10%, top:-10% (выходит за верхний и левый край)
  — Desktop: width:20vw, overflow:hidden на топбаре НЕ обрезает снизу
    (высота топбара > высота вектора — он вписывается)
    → для этого убираем overflow:hidden на десктопе
  — Mobile: overflow:hidden на топбаре обрезает снизу (вектор 50vw > высота топбара)
    При открытом описании (max-height расширяет .sec-topbar через flex) нижняя часть видна
*/
.sec-topbar {
  position:relative; z-index:20; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 36px;
  /* overflow:hidden только на мобиле — выставляется через медиа */
}
@media(max-width:768px){ .sec-topbar{ padding:16px 20px; overflow:hidden; } }

/* Вектор: один элемент в топбаре */
.sec-vec {
  position:absolute;
  left:-10%; top:-10%;
  width:20vw; height:auto;
  pointer-events:none; z-index:0;
  opacity:.2; transition:opacity .4s;
}
.sec-vec.show { opacity:.8; }
@media(max-width:768px){ .sec-vec{ width:50vw; } }

.sec-back { position:relative; z-index:1; font-size:clamp(12px,1vw,15px); font-weight:500; letter-spacing:.06em; white-space:nowrap; flex-shrink:0; }
.sec-right { position:relative; z-index:1; display:flex; align-items:center; gap:28px; flex-shrink:0; }
.sec-chrono { font-size:clamp(11px,.95vw,13px); font-weight:300; letter-spacing:.3em; text-transform:lowercase; transition:opacity .2s; }
.sec-chrono:hover, .sec-chrono.on { opacity:.45; }
.sec-title-btn { font-size:clamp(11px,.95vw,13px); font-weight:700; letter-spacing:.3em; text-transform:lowercase; transition:opacity .2s; }
.sec-title-btn:hover { opacity:.7; }

.chrono-row { display:none; position:relative; z-index:20; flex-shrink:0; justify-content:flex-end; padding:0 20px 8px; }
@media(max-width:768px){ .sec-topbar .sec-chrono{display:none} .chrono-row{display:flex!important} }

/* Body */
.sec-body { flex:1; display:flex; min-height:0; position:relative; z-index:10; }

/* Scroll */
.sec-scroll { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:16px 36px 80px; position:relative; }
@media(max-width:768px){ .sec-scroll{padding:12px 20px 80px} }

/* Описание — desktop: выезжает справа */
.sec-desc {
  flex-shrink:0; overflow:hidden;
  width:clamp(260px,32vw,400px);
  transform:translateX(100%);
  transition:transform .4s ease-out;
  will-change:transform;
  z-index:15;
}
.sec-desc.open { transform:translateX(0); }
.sec-desc-inner { width:clamp(260px,32vw,400px); height:100%; overflow-y:auto; padding:20px 24px 24px 20px; -webkit-overflow-scrolling:touch; }
.sec-desc-inner p { font-size:9pt; font-weight:300; letter-spacing:.08em; line-height:1.75; color:rgba(255,255,255,.85); text-align:justify; }
.sec-desc-inner p+p { margin-top:10px; }

/* Mobile: описание выезжает вниз из топбара */
@media(max-width:768px){
  .sec-body { flex-direction:column; overflow:visible; }
  .sec-desc {
    position:relative; width:100%!important;
    transform:none; max-height:0; overflow:hidden;
    transition:max-height .45s ease-out;
    order:-1; z-index:20;
  }
  .sec-desc.open { max-height:60vh; }
  .sec-desc-inner { width:100%; height:auto; max-height:60vh; padding:16px 20px 16px; }
}
.desc-close-mob { display:none; width:100%; text-align:center; padding:6px 0; cursor:pointer; font-size:18px; color:rgba(255,255,255,.3); flex-shrink:0; }
@media(max-width:768px){ .desc-close-mob{display:block} }

/* Область справа (закрытое описание) — прозрачный оверлей для скролла ленты */
.sec-desc-proxy {
  display:none;
  position:absolute; top:0; right:0; bottom:0;
  width:clamp(260px,32vw,400px);
  z-index:14; cursor:default;
}
/* показываем только на десктопе когда описание закрыто */
@media(min-width:769px){ .sec-desc-proxy.active { display:block; } }

/* Artwork */
.art-card { margin-top:32px; position:relative; z-index:2; }
.art-thumb { width:100%; height:auto; display:block; cursor:pointer; }
.art-info { margin-top:16px; }
.art-title { font-size:clamp(18px,1.8vw,26px); font-weight:400; letter-spacing:.1em; color:#eef3f6; line-height:1.3; }
.art-mat { margin-top:10px; font-size:clamp(10px,.85vw,12px); font-weight:400; letter-spacing:.1em; color:#9b9b9b; line-height:1.4; }
.art-year { margin-top:5px; font-size:clamp(10px,.85vw,12px); font-weight:400; letter-spacing:.1em; color:#9b9b9b; }
.art-price { margin-top:14px; font-size:clamp(14px,1.3vw,18px); font-weight:400; letter-spacing:.06em; color:#555; }

/* ── TEXT VIEW (bio / statement) ── */
#view-text { background:#0a0a0a; }
.text-top { flex-shrink:0; display:flex; align-items:baseline; justify-content:space-between; padding:28px 48px; }
.text-ttl { font-size:clamp(13px,1.1vw,16px); font-weight:300; letter-spacing:.3em; text-transform:lowercase; }
.text-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:36px 10vw 60px; min-height:0; }
/* Абзацы в обычных страницах */
.text-body p {
  font-size:clamp(14px,1.1vw,16px); font-weight:300; letter-spacing:.05em;
  line-height:1.9; color:rgba(255,255,255,.88); text-align:justify;
  text-indent:2em; margin-bottom:.5em;
}
/* CV — особый тип страницы */
.cv-section { margin-bottom:32px; }
.cv-section-title {
  font-size:clamp(14px,1.1vw,16px); font-weight:500; letter-spacing:.12em;
  text-transform:uppercase; color:rgba(255,255,255,.9);
  margin-bottom:12px;
}
.cv-section-text {
  font-size:clamp(13px,1vw,15px); font-weight:400; letter-spacing:.04em;
  line-height:1.85; color:rgba(255,255,255,.75);
}
.cv-section-text p { margin-bottom:.4em; }
@media(max-width:768px){ .text-top{padding:20px 24px} .text-body{padding:24px 24px 60px} }

/* ── LIGHTBOX ── */
.lb { position:fixed; inset:0; z-index:500; display:none; align-items:center; justify-content:center; }
.lb.open { display:flex; }
/* Фон — полный клик закрывает */
.lb-bg { position:absolute; inset:0; cursor:pointer; backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); background:rgba(0,0,0,.88); }
.lb-stage { position:relative; z-index:1; width:100%; max-width:calc(100vw - 80px); }
/* overflow:hidden на stage — чтобы слайды не торчали */
.lb-viewport { overflow:hidden; width:100%; }
.lb-track { display:flex; transition:transform .35s ease; will-change:transform; }
.lb-slide { flex:0 0 100%; width:100%; display:flex; align-items:center; justify-content:center; padding:0 4px; }
.lb-slide img { max-width:100%; max-height:calc(100vh - 120px); object-fit:contain; pointer-events:none; user-select:none; display:block; }
.lb-arr {
  position:absolute; top:50%; transform:translateY(-50%);
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,255,255,.12); font-size:24px;
  display:flex; align-items:center; justify-content:center;
  z-index:2; transition:background .2s; cursor:pointer;
}
.lb-arr:hover { background:rgba(255,255,255,.28); }
.lb-prv { left:-56px; } .lb-nxt { right:-56px; }
@media(max-width:768px){ .lb-stage{max-width:calc(100vw - 48px)} .lb-prv{left:-28px} .lb-nxt{right:-28px} }
.lb-dots { position:absolute; bottom:-32px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
.lb-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; transition:background .2s; }
.lb-dot.on { background:rgba(255,255,255,.9); }
.lb-counter { position:absolute; top:-28px; right:0; font-size:10px; font-weight:300; letter-spacing:.2em; color:rgba(255,255,255,.4); }

::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); }
</style>
</head>

<script>
const STATE = {
  artistName: 'Александр\nВечеров',
  homePhoto: null,
  sections: [
    { id:'branching', title:'код ветвления', vec:null, type:'section',
      desc:'Этот раздел посвящён структурным принципам жизни.\nЯ рассматриваю жизнь как систему связей, в которой каждое действие опирается на предыдущее и формирует последующее.\n\nВ своей работе я обращаюсь к двум способам организации: древовидному и ризоматическому.\n\nВ реальности эти принципы накладываются друг на друга, формируя сеть пересечений.',
      arts:[
        {images:[], title:'«Организация органики»', material:'бумага 200 г/м², сангина', size:'1000 × 1000мм', year:'2026 г.', price:'?0.000₽'},
        {images:[], title:'«Без названия»', material:'холст, масло', size:'600 × 800мм', year:'2025 г.', price:null}
      ]
    },
    { id:'metaphysics', title:'метафизика повседневности', vec:null, type:'section',
      desc:'В этом разделе исследуется скрытое измерение обыденного.\nКаждый предмет, жест, взгляд несёт в себе след более глубоких структур.',
      arts:[{images:[], title:'«Без названия»', material:'бумага, карандаш', size:'400 × 600мм', year:'2025 г.', price:null}]
    },
    { id:'digital', title:'цифровые работы', vec:null, type:'section',
      desc:'Цифровые практики как расширение традиционных. Инструмент меняется — вопрос остаётся прежним.', arts:[] },
    { id:'jewelry', title:'ювелирные изделия', vec:null, type:'section',
      desc:'Ювелирное ремесло как форма концептуального высказывания.', arts:[] },
    { id:'bio', title:'bio', type:'page',
      text:'Александр Вечеров — художник, работающий на пересечении концептуального реализма и сюрреализма.\n\nОсновные медиумы: живопись, графика, ленд-арт, керамическая скульптура, ювелирное ремесло и текстиль.\n\nРодился и работает в России. Исследует структуру жизни, принципы её организации и механизмы роста систем.\n\nУчастник выставок. Работы находятся в частных коллекциях.' },
    { id:'statement', title:'artist statement', type:'page',
      text:'Я работаю в жанре концептуального реализма с элементами сюрреализма.\n\nЭтот подход представляется мне наиболее точным инструментом для акцентирования внимания на скрытых механизмах и мистических проявлениях реальности.\n\nТрадиционные техники и материалы привлекают меня своей каноничностью, поскольку позволяют говорить о фундаментальных процессах, опираясь на доступные для восприятия образы.\n\nВ своём творчестве я исследую структуру жизни и принципы её организации.\n\nЯ воспринимаю художественную практику как способ фиксации и исследования невидимых связей, формирующих наше существование.' },
    { id:'cv', title:'cv', type:'cv',
      subsections:[
        { title:'Образование', text:'2010–2015 — Московский государственный академический художественный институт им. В.И. Сурикова' },
        { title:'Выставки', text:'2024 — «Ризоматические узлы», галерея XYZ, Москва\n2023 — «Структуры роста», арт-центр Cube, Санкт-Петербург' },
        { title:'Публикации', text:'Artguide, 2024\nKOTEL magazine, 2023' }
      ]
    }
  ]
};

let cur = null, descOpen = false, rev = false, lbArr = [], lbI = 0;
const isMob = () => window.innerWidth <= 768;

function show(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
}

/* ── MENU ── */
function renderMenu() {
  const nav = document.getElementById('menu-nav');
  nav.innerHTML = '';
  STATE.sections.filter(s => s.type === 'section').forEach(s => {
    const el = document.createElement('div');
    el.className = 'menu-item';
    el.innerHTML = s.title.replace('\n','<br>');
    el.addEventListener('click', () => { mOv.classList.remove('open'); setTimeout(()=>openSec(s.id), 80); });
    nav.appendChild(el);
  });
  const line = document.createElement('div'); line.className = 'menu-line'; nav.appendChild(line);
  STATE.sections.filter(s => s.type !== 'section').forEach(p => {
    const el = document.createElement('div');
    el.className = 'menu-sub'; el.textContent = p.title;
    el.addEventListener('click', () => { mOv.classList.remove('open'); setTimeout(()=>openPage(p.id), 80); });
    nav.appendChild(el);
  });
}

const mOv = document.getElementById('menu-ov');
document.getElementById('btn-menu').addEventListener('click', () => { renderMenu(); mOv.classList.add('open'); });
document.getElementById('menu-dismiss').addEventListener('click', e => {
  if (!e.target.closest('.menu-panel')) mOv.classList.remove('open');
});
let swX = null;
document.getElementById('menu-panel').addEventListener('touchstart', e=>{ swX=e.touches[0].clientX; },{passive:true});
document.getElementById('menu-panel').addEventListener('touchend', e=>{
  if (swX!==null && e.changedTouches[0].clientX-swX>60) mOv.classList.remove('open');
  swX=null;
},{passive:true});

/* ── SECTION ── */
function openSec(id) {
  const s = STATE.sections.find(x=>x.id===id);
  if (!s || s.type!=='section') return;
  cur = id; rev = false;
  document.getElementById('sec-title-btn').textContent = s.title;
  document.getElementById('sec-back').textContent = isMob() ? '<' : '< назад';
  const vec = document.getElementById('sec-vec');
  if (s.vec) { vec.src=s.vec; vec.style.display='block'; }
  else { vec.style.display='none'; }
  document.getElementById('sec-desc-inner').innerHTML =
    s.desc.split('\n\n').map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  setDesc(true);
  document.getElementById('sec-chrono').classList.remove('on');
  document.getElementById('sec-chrono-m').classList.remove('on');
  document.getElementById('sec-scroll').scrollTop = 0;
  renderArts();
  show('section');
}

window.addEventListener('resize', () => {
  if (cur) document.getElementById('sec-back').textContent = isMob() ? '<' : '< назад';
});

function setDesc(open) {
  descOpen = open;
  document.getElementById('sec-desc').classList.toggle('open', open);
  document.getElementById('sec-vec').classList.toggle('show', open);
  /* Прокси-область: активна только когда описание закрыто */
  document.getElementById('sec-desc-proxy').classList.toggle('active', !open);
}

document.getElementById('sec-title-btn').addEventListener('click', ()=>setDesc(!descOpen));
document.getElementById('desc-close').addEventListener('click', ()=>setDesc(false));

/* Прокси-область передаёт скролл в ленту */
document.getElementById('sec-desc-proxy').addEventListener('wheel', e=>{
  document.getElementById('sec-scroll').scrollTop += e.deltaY;
}, {passive:true});
document.getElementById('sec-desc-proxy').addEventListener('click', ()=>{ if(!descOpen) setDesc(false); });

/* Desktop: клик по пустому месту ленты закрывает */
document.getElementById('sec-scroll').addEventListener('click', e=>{
  if (!descOpen||isMob()) return;
  if (e.target.closest('.art-card')) return;
  setDesc(false);
});

/* Desktop: свайп вправо по описанию */
let dSwX=null;
document.getElementById('sec-desc').addEventListener('touchstart',e=>{dSwX=e.touches[0].clientX;},{passive:true});
document.getElementById('sec-desc').addEventListener('touchend',e=>{
  if(dSwX===null)return;
  if(!isMob()&&e.changedTouches[0].clientX-dSwX>60) setDesc(false);
  dSwX=null;
},{passive:true});

/* Mobile: свайп вниз по описанию */
let dSwY=null;
document.getElementById('sec-desc').addEventListener('touchstart',e=>{dSwY=e.touches[0].clientY;},{passive:true});
document.getElementById('sec-desc').addEventListener('touchend',e=>{
  if(!isMob()||dSwY===null)return;
  if(e.changedTouches[0].clientY-dSwY>50) setDesc(false);
  dSwY=null;
},{passive:true});

function togChrono(){
  rev=!rev;
  document.getElementById('sec-chrono').classList.toggle('on',rev);
  document.getElementById('sec-chrono-m').classList.toggle('on',rev);
  renderArts();
}
document.getElementById('sec-chrono').addEventListener('click',togChrono);
document.getElementById('sec-chrono-m').addEventListener('click',togChrono);
document.getElementById('sec-back').addEventListener('click',()=>{ renderMenu(); mOv.classList.add('open'); show('home'); });

function renderArts() {
  const sec = STATE.sections.find(s=>s.id===cur);
  const arr = rev ? [...sec.arts].reverse() : sec.arts;
  const list = document.getElementById('art-list');
  list.innerHTML = '';
  arr.forEach(art => {
    const card = document.createElement('div'); card.className='art-card';
    if (art.images && art.images.length) {
      const img = document.createElement('img'); img.className='art-thumb'; img.src=art.images[0];
      img.addEventListener('click', ()=>openLB(art.images, 0));
      card.appendChild(img);
    }
    const info = document.createElement('div'); info.className='art-info';
    if (art.title) { const t=document.createElement('div'); t.className='art-title'; t.textContent=art.title; info.appendChild(t); }
    if (art.material||art.size) {
      const m=document.createElement('div'); m.className='art-mat';
      let h=art.material||''; if(art.size) h+=(art.material?'<br>':'')+art.size;
      m.innerHTML=h; info.appendChild(m);
    }
    if (art.year) { const y=document.createElement('div'); y.className='art-year'; y.textContent=art.year; info.appendChild(y); }
    if (art.price) { const p=document.createElement('div'); p.className='art-price'; p.textContent=art.price; info.appendChild(p); }
    card.appendChild(info);
    list.appendChild(card);
  });
}

/* ── PAGE: bio / statement (обычный текст с абзацами) ── */
/* ── PAGE: cv (подразделы title+text) ── */
function openPage(id) {
  const p = STATE.sections.find(s=>s.id===id);
  if (!p || p.type==='section') return;
  document.getElementById('text-ttl').textContent = p.title;
  const body = document.getElementById('text-body');
  body.innerHTML = '';

  if (p.type === 'cv') {
    /* CV — подразделы */
    (p.subsections||[]).forEach(sub => {
      const sec = document.createElement('div'); sec.className='cv-section';
      const t = document.createElement('div'); t.className='cv-section-title'; t.textContent=sub.title;
      const d = document.createElement('div'); d.className='cv-section-text';
      d.innerHTML = sub.text.split('\n').map(l=>`<p>${l}</p>`).join('');
      sec.appendChild(t); sec.appendChild(d); body.appendChild(sec);
    });
  } else {
    /* Обычная страница — абзацы через \n\n */
    body.innerHTML = p.text.split('\n\n').map(t=>`<p>${t.replace(/\n/g,'<br>')}</p>`).join('');
  }
  show('text');
}
document.getElementById('text-back').addEventListener('click',()=>{ renderMenu(); mOv.classList.add('open'); show('home'); });

/* ── LIGHTBOX ── */
function openLB(imgs, startIdx) {
  lbArr=imgs; lbI=startIdx;
  const tr=document.getElementById('lb-track'); tr.innerHTML='';
  imgs.forEach(src=>{
    const slide=document.createElement('div'); slide.className='lb-slide';
    const img=document.createElement('img'); img.src=src;
    slide.appendChild(img); tr.appendChild(slide);
  });
  const dots=document.getElementById('lb-dots'); dots.innerHTML='';
  if(imgs.length>1) imgs.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='lb-dot'+(i===0?' on':'');
    d.addEventListener('click',e=>{ e.stopPropagation(); goLB(i); });
    dots.appendChild(d);
  });
  document.getElementById('lb-prv').style.display=imgs.length>1?'':'none';
  document.getElementById('lb-nxt').style.display=imgs.length>1?'':'none';
  document.getElementById('lb').classList.add('open');
  /* Два rAF — гарантируем что DOM отрендерен и ширина известна */
  requestAnimationFrame(()=>requestAnimationFrame(()=>updLB()));
}

function closeLB() { document.getElementById('lb').classList.remove('open'); }

/* Закрытие: клик по фону (lb-bg) */
document.getElementById('lb-bg').addEventListener('click', closeLB);

/* Закрытие: клик по области вне изображения внутри stage тоже закрывает */
document.getElementById('lb-stage').addEventListener('click', e=>{
  /* если кликнули не по img и не по кнопкам */
  if (!e.target.closest('img') && !e.target.closest('.lb-arr') && !e.target.closest('.lb-dot')) {
    closeLB();
  }
});

function goLB(i){ lbI=Math.max(0,Math.min(i,lbArr.length-1)); updLB(); }

function updLB(){
  const vp = document.querySelector('.lb-viewport');
  const w = vp ? vp.offsetWidth : (window.innerWidth-80);
  document.getElementById('lb-track').style.transform=`translateX(${-lbI*w}px)`;
  document.getElementById('lb-counter').textContent=lbArr.length>1?`${lbI+1} / ${lbArr.length}`:'';
  document.querySelectorAll('.lb-dot').forEach((d,i)=>d.classList.toggle('on',i===lbI));
}

document.getElementById('lb-prv').addEventListener('click',e=>{ e.stopPropagation(); goLB(lbI-1); });
document.getElementById('lb-nxt').addEventListener('click',e=>{ e.stopPropagation(); goLB(lbI+1); });

document.addEventListener('keydown',e=>{
  if(!document.getElementById('lb').classList.contains('open'))return;
  if(e.key==='ArrowLeft') goLB(lbI-1);
  if(e.key==='ArrowRight') goLB(lbI+1);
  if(e.key==='Escape') closeLB();
});

/* Свайп по LB */
let ltx=null;
document.getElementById('lb-stage').addEventListener('touchstart',e=>{
  if(e.target.closest('.lb-arr')||e.target.closest('.lb-dot'))return;
  ltx=e.touches[0].clientX;
},{passive:true});
document.getElementById('lb-stage').addEventListener('touchend',e=>{
  if(ltx===null)return;
  const dx=e.changedTouches[0].clientX-ltx;
  if(Math.abs(dx)>40){ dx<0?goLB(lbI+1):goLB(lbI-1); }
  else if(Math.abs(dx)<8){ /* это тап — закрыть если не на img/кнопках */ }
  ltx=null;
},{passive:true});

/* ── PINCH ZOOM на первом фото в ленте (не конфликтует с LB) ── */
(function(){
  let el=null,sc=1,px=0,py=0,ld=0,lx=0,ly=0,lt=0,pinching=false;
  const rst=()=>{
    if(!el)return;
    el.style.transform=''; el.style.position=''; el.style.zIndex='';
    el=null; sc=1; px=0; py=0; pinching=false;
  };
  document.addEventListener('touchstart',e=>{
    if(window.innerWidth>768||document.getElementById('lb').classList.contains('open'))return;
    const t=e.target.closest('.art-thumb'); if(!t)return;
    if(e.touches.length===2){
      pinching=true; el=t;
      ld=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    }
    if(e.touches.length===1){ lx=e.touches[0].clientX; ly=e.touches[0].clientY; }
    const now=Date.now(); if(now-lt<280&&sc>1)rst(); lt=now;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!el||!pinching)return;
    if(e.touches.length===2){
      e.preventDefault();
      const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      sc=Math.max(1,Math.min(sc*(d/ld),4)); ld=d;
    } else if(e.touches.length===1&&sc>1){
      e.preventDefault();
      px+=e.touches[0].clientX-lx; py+=e.touches[0].clientY-ly;
      lx=e.touches[0].clientX; ly=e.touches[0].clientY;
    }
    el.style.transform=`scale(${sc}) translate(${px/sc}px,${py/sc}px)`;
    el.style.transformOrigin='center center';
    el.style.position='relative'; el.style.zIndex='30';
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(!el)return;
    if(e.touches.length===0&&sc<=1.05)rst();
    if(e.touches.length<2) pinching=false;
  },{passive:true});
})();
