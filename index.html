<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Александр Вечеров</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0a0a; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; color:#fff; -webkit-font-smoothing:antialiased; }
button { background:none; border:none; cursor:pointer; font-family:inherit; color:inherit; }
a { color:inherit; text-decoration:none; }
img { display:block; }

.view { position:fixed; inset:0; display:none; flex-direction:column; }
.view.active { display:flex; }

/* ══════════════════════════════════════
   HOME
══════════════════════════════════════ */
#view-home { overflow:hidden; }
.home-bg { position:absolute; inset:0; background:#111; }
.home-bg img { width:100%; height:100%; object-fit:cover; }
.home-bg-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:11px; letter-spacing:.2em; color:rgba(255,255,255,.1); text-transform:uppercase; }
.home-ui { position:absolute; inset:0; z-index:5; }
.home-top { display:flex; justify-content:space-between; align-items:flex-start; padding:28px 32px; }
.artist-name { font-size:13px; font-weight:300; letter-spacing:.22em; line-height:1.55; text-transform:uppercase; }
.dots-btn { display:flex; flex-direction:column; gap:5px; padding:2px; }
.dots-btn span { display:block; width:4px; height:4px; background:#fff; }

/* upload — label wraps hidden input, works on iOS Safari */
.home-upload { position:absolute; bottom:32px; left:50%; transform:translateX(-50%); z-index:10; }
.home-upload label {
  display:block; cursor:pointer;
  font-size:10px; font-weight:300; letter-spacing:.2em; text-transform:uppercase;
  border:1px solid rgba(255,255,255,.22); padding:9px 22px;
  background:rgba(0,0,0,.4); white-space:nowrap; color:#fff;
}
#inp-home { position:absolute; left:-9999px; opacity:0; width:1px; height:1px; }

/* ══════════════════════════════════════
   MENU
   макет desctop_2:
   — правая панель ~42vw, НЕ full-screen на десктопе
   — пункты: вверху, right-align, font-weight:300, kern .3em
   — divider: 25% ширины, тёмный
   — bio/statement: font-weight:100
   — иконки: внизу справа
   — закрыть: клик вне панели ИЛИ свайп вправо по панели
══════════════════════════════════════ */
.menu-ov { position:fixed; inset:0; z-index:200; pointer-events:none; }
.menu-ov.open { pointer-events:all; }

.menu-blur {
  position:absolute; inset:0;
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  background:rgba(0,0,0,.73);
  opacity:0; transition:opacity .7s cubic-bezier(.4,0,.2,1);
}
.menu-ov.open .menu-blur { opacity:1; }
.menu-dismiss { position:absolute; inset:0; }

.menu-panel {
  position:absolute; top:0; right:0; bottom:0;
  /* десктоп: правая часть экрана */
  width:clamp(280px,42vw,520px);
  display:flex; flex-direction:column;
  /* пункты ВВЕРХУ — padding сверху даёт отступ как от верхнего края */
  padding:52px 48px 48px 40px;
  transform:translateX(100%);
  transition:transform .7s cubic-bezier(.4,0,.2,1);
}
.menu-ov.open .menu-panel { transform:translateX(0); }

/* nav: flex-start = пункты начинаются сверху */
.menu-nav {
  display:flex; flex-direction:column;
  align-items:flex-end;
  /* flex-start — не center! */
  justify-content:flex-start;
  flex:1;
}

.menu-item {
  font-size:clamp(13px,1.35vw,16px); font-weight:300;
  letter-spacing:.3em; text-transform:lowercase;
  text-align:right; padding:16px 0; line-height:1.3;
  cursor:pointer; transition:opacity .2s; width:100%;
}
.menu-item:hover { opacity:.5; }

/* divider: ~25% ширины, справа, тёмный */
.menu-line { height:1px; background:rgba(255,255,255,.15); width:25%; margin:14px 0 14px auto; }

.menu-sub {
  font-size:clamp(11px,1.1vw,13px); font-weight:100;
  letter-spacing:.3em; text-transform:lowercase;
  text-align:right; padding:13px 0;
  cursor:pointer; transition:opacity .2s; width:100%;
}
.menu-sub:hover { opacity:.5; }

/* иконки внизу — всегда видны */
.menu-icons { display:flex; justify-content:flex-end; gap:22px; margin-top:auto; padding-top:32px; }
.menu-icons a { opacity:.65; transition:opacity .2s; display:flex; align-items:center; }
.menu-icons a:hover { opacity:1; }
.menu-icons img { width:22px; height:22px; object-fit:contain; filter:invert(1); }

/* mobile: full screen */
@media (max-width:768px) {
  .menu-panel { width:100%; padding:52px 32px 44px; }
}

/* ══════════════════════════════════════
   SECTION VIEW
   макет desctop_3 / mobile_3:

   Структура:
   ┌─────────────────────────────────────┐
   │ .sec-topbar                         │  flex-shrink:0, одна строка:
   │  [< назад]   [хронология] [НАЗВАНИЕ]│  (на mobile: хронология ниже)
   ├─────────────────────────────────────┤
   │ .sec-desc (max-height, slides down) │  продолжение топбара
   │  + векторное изображение в нём      │
   ├─────────────────────────────────────┤
   │ .sec-scroll (flex:1, overflow-y)    │  лента с работами
   └─────────────────────────────────────┘

   Вектор: position:absolute top-left в контентной зоне,
   при открытом описании — появляется вместе со шторкой
══════════════════════════════════════ */
#view-section { position:relative; overflow:hidden; background:#0a0a0a; }

.sec-bg { position:absolute; inset:0; z-index:0; overflow:hidden; }
.sec-bg-img { position:absolute; inset:-8%; background:center/cover no-repeat; filter:blur(18px); transform:scale(1.15); }
.sec-bg-dim { position:absolute; inset:0; background:rgba(0,0,0,.90); }

/* ── TOPBAR: только строка кнопок, компактная ── */
.sec-topbar {
  position:relative; z-index:20; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 36px;
  /* фон = лёгкое затемнение, одна плашка с desc-panel */
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
}
.sec-back { font-size:13px; font-weight:500; letter-spacing:.06em; white-space:nowrap; flex-shrink:0; }
.sec-topbar-right { display:flex; align-items:center; gap:28px; flex-shrink:0; }
.sec-chrono { font-size:10pt; font-weight:300; letter-spacing:.3em; text-transform:lowercase; transition:opacity .2s; }
.sec-chrono:hover, .sec-chrono.on { opacity:.45; }
.sec-titleBtn { font-size:10pt; font-weight:700; letter-spacing:.3em; text-transform:lowercase; transition:opacity .2s; }
.sec-titleBtn:hover { opacity:.7; }

/* mobile only: хронология отдельной строкой */
.chrono-row {
  display:none;
  position:relative; z-index:20; flex-shrink:0;
  justify-content:flex-end;
  padding:0 36px 14px;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
}
@media (max-width:768px) {
  .sec-topbar { padding:16px 20px; }
  .sec-topbar .sec-chrono { display:none; }
  .chrono-row { display:flex !important; padding:0 20px 12px; }
}

/* ── DESC PANEL: выезжает вниз из топбара ──
   Тот же фон что и топбар — единая шторка.
   Содержит текст описания + векторное изображение.
   max-height:0 → открытое состояние.
*/
.sec-desc {
  position:relative; z-index:19; flex-shrink:0;
  overflow:hidden;
  max-height:0;
  pointer-events:none;
  transition:max-height .5s cubic-bezier(.4,0,.2,1);
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
}
.sec-desc.open { max-height:60vh; pointer-events:all; }

.sec-desc-body {
  display:flex; gap:20px;
  padding:16px 36px 24px;
  overflow-y:auto; max-height:60vh;
}

/* векторное изображение внутри шторки описания */
.sec-desc-vec {
  flex-shrink:0;
  width:80px; height:80px;
  object-fit:contain;
  opacity:.7; align-self:flex-start;
}
@media (max-width:768px) { .sec-desc-vec { width:56px; height:56px; } }

.sec-desc-text { flex:1; }
.sec-desc-text p {
  font-size:9pt; font-weight:300; letter-spacing:.08em;
  line-height:1.75; color:rgba(255,255,255,.8); text-align:justify;
}
.sec-desc-text p+p { margin-top:10px; }

/* кнопка закрыть (mobile) */
.desc-close {
  display:none; width:100%; text-align:center;
  padding:6px 0 2px; cursor:pointer; font-size:18px; color:rgba(255,255,255,.3);
  background:rgba(0,0,0,.82); flex-shrink:0;
}
@media (max-width:768px) { .desc-close { display:block; } }

/* ── SCROLL: лента с работами, независимая от топбара ── */
.sec-scroll {
  position:relative; z-index:10;
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:16px 36px 60px;
}
@media (max-width:768px) { .sec-scroll { padding:12px 20px 80px; } }

/* загрузка изображения */
.art-upload { margin-bottom:8px; }
.art-upload label {
  display:inline-block; cursor:pointer;
  font-size:9px; font-weight:300; letter-spacing:.2em; text-transform:uppercase;
  border:1px solid rgba(255,255,255,.15); padding:7px 16px;
  background:rgba(255,255,255,.03); color:#fff; transition:background .2s;
}
.art-upload label:active { background:rgba(255,255,255,.1); }
#inp-art { position:absolute; left:-9999px; opacity:0; width:1px; height:1px; }

/* карточка работы */
.art-card { margin-top:28px; }
.art-img { display:block; width:100%; cursor:pointer; transition:width .45s cubic-bezier(.4,0,.2,1); }
.sec-scroll.dopen .art-img { width:85%; }
@media (max-width:768px) { .sec-scroll.dopen .art-img { width:100%; } }

.art-title { margin-top:16px; font-size:18px; font-weight:400; letter-spacing:.1em; color:#eef3f6; line-height:1.3; }
.art-mat { margin-top:8px; font-size:9px; font-weight:400; letter-spacing:.1em; color:#9b9b9b; line-height:1.35; }
.art-year { margin-top:5px; font-size:9px; font-weight:400; letter-spacing:.1em; color:#9b9b9b; }
.art-price { margin-top:10px; font-size:15px; font-weight:400; letter-spacing:.06em; color:#2d2d2d; }

/* ══════════════════════════════════════
   TEXT VIEW
══════════════════════════════════════ */
#view-text { background:#0a0a0a; }
.text-top { flex-shrink:0; display:flex; align-items:baseline; justify-content:space-between; padding:28px 48px; }
.text-ttl { font-size:13px; font-weight:100; letter-spacing:.3em; text-transform:lowercase; }
.text-body { flex:1; overflow-y:auto; padding:36px 10vw 60px; }
.text-body p { font-size:13px; font-weight:300; letter-spacing:.05em; line-height:1.85; color:rgba(255,255,255,.88); text-align:justify; text-indent:2em; }
@media (max-width:768px) { .text-top { padding:20px 24px; } .text-body { padding:24px 24px 60px; } }

/* ══════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════ */
.lb { position:fixed; inset:0; z-index:500; display:none; align-items:center; justify-content:center; }
.lb.open { display:flex; }
.lb-bg { position:absolute; inset:0; cursor:pointer; backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); background:rgba(0,0,0,.85); }
.lb-stage { position:relative; z-index:1; }
.lb-track { display:flex; transition:transform .4s ease; }
.lb-slide img { max-width:calc(100vw - 80px); max-height:calc(100vh - 80px); object-fit:contain; }
@media (max-width:768px) { .lb-slide img { max-width:calc(100vw - 48px); } }
.lb-arr { position:absolute; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.1); font-size:22px; display:flex; align-items:center; justify-content:center; transition:background .2s; z-index:2; }
.lb-arr:hover { background:rgba(255,255,255,.25); }
.lb-prv { left:-52px; } .lb-nxt { right:-52px; }
@media (max-width:768px) { .lb-prv { left:-28px; } .lb-nxt { right:-28px; } }
.lb-dots { position:absolute; bottom:-28px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
.lb-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; }
.lb-dot.on { background:rgba(255,255,255,.9); }

::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); }
</style>
</head>
<body>

<!-- HOME -->
<div id="view-home" class="view active">
  <div class="home-bg" id="home-bg">
    <div class="home-bg-ph" id="home-ph">загрузите фото</div>
  </div>
  <div class="home-ui">
    <div class="home-top">
      <div class="artist-name">Александр<br>Вечеров</div>
      <button class="dots-btn" id="btn-menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
  <div class="home-upload">
    <label for="inp-home">загрузить фото главной</label>
    <input type="file" id="inp-home" accept="image/*">
  </div>
</div>

<!-- MENU -->
<div class="menu-ov" id="menu-ov">
  <div class="menu-blur"></div>
  <div class="menu-dismiss" id="menu-dismiss"></div>
  <div class="menu-panel" id="menu-panel">
    <nav class="menu-nav">
      <div class="menu-item" data-sec="branching">код ветвления</div>
      <div class="menu-item" data-sec="metaphysics">метафизика<br>повседневности</div>
      <div class="menu-item" data-sec="digital">цифровые работы</div>
      <div class="menu-item" data-sec="jewelry">ювелирные<br>изделия</div>
      <div class="menu-line"></div>
      <div class="menu-sub" data-page="bio">bio</div>
      <div class="menu-sub" data-page="statement">artist statement</div>
    </nav>
    <div class="menu-icons">
      <a href="mailto:eveningoff16@gmail.com" title="email">
        <img src="assets/mail_icon.png" onerror="this.closest('a').style.display='none'" alt="✉">
      </a>
      <a href="https://t.me/eveningoff" target="_blank" title="telegram">
        <img src="assets/telegram_icon.png" onerror="this.closest('a').style.display='none'" alt="✈">
      </a>
      <a href="https://instagram.com/eveningoff" target="_blank" title="instagram">
        <img src="assets/instagram_icon.png" onerror="this.closest('a').style.display='none'" alt="◎">
      </a>
    </div>
  </div>
</div>

<!-- SECTION -->
<div id="view-section" class="view">

  <div class="sec-bg">
    <div class="sec-bg-img" id="sec-bg-img"></div>
    <div class="sec-bg-dim"></div>
  </div>

  <!-- TOPBAR: одна строка -->
  <div class="sec-topbar">
    <button class="sec-back" id="sec-back">< назад</button>
    <div class="sec-topbar-right">
      <button class="sec-chrono" id="sec-chrono">хронология</button>
      <button class="sec-titleBtn" id="sec-titleBtn"></button>
    </div>
  </div>

  <!-- mobile: хронология строкой -->
  <div class="chrono-row">
    <button class="sec-chrono" id="sec-chrono-m">хронология</button>
  </div>

  <!-- DESC PANEL: выезжает вниз, содержит вектор + текст -->
  <div class="sec-desc" id="sec-desc">
    <div class="sec-desc-body">
      <img class="sec-desc-vec" id="sec-desc-vec" src="" alt=""
           onerror="this.style.display='none'" style="display:none">
      <div class="sec-desc-text" id="sec-desc-text"></div>
    </div>
    <button class="desc-close" id="desc-close">&#94;</button>
  </div>

  <!-- ЛЕНТА: независимая от топбара -->
  <div class="sec-scroll" id="sec-scroll">
    <div class="art-upload">
      <label for="inp-art">+ загрузить изображение</label>
      <input type="file" id="inp-art" accept="image/*" multiple>
    </div>
    <div id="art-list"></div>
  </div>

</div>

<!-- TEXT -->
<div id="view-text" class="view">
  <div class="text-top">
    <button class="sec-back" id="text-back">< назад</button>
    <div class="text-ttl" id="text-ttl"></div>
  </div>
  <div class="text-body" id="text-body"></div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb">
  <div class="lb-bg" id="lb-bg"></div>
  <div class="lb-stage" id="lb-stage">
    <div class="lb-track" id="lb-track"></div>
    <button class="lb-arr lb-prv" id="lb-prv">&#8249;</button>
    <button class="lb-arr lb-nxt" id="lb-nxt">&#8250;</button>
    <div class="lb-dots" id="lb-dots"></div>
  </div>
</div>

<script>
const SEC = {
  branching:{ title:'код ветвления', vec:'assets/puzzle.png', desc:'Этот раздел посвящён структурным принципам жизни.\nЯ рассматриваю жизнь как систему связей, в которой каждое действие опирается на предыдущее и формирует последующее.\n\nВ своей работе я обращаюсь к двум способам организации: древовидному и ризоматическому. Первый предполагает иерархию и направленный рост, второй — множественность связей и отсутствие единого центра.\n\nВ реальности эти принципы накладываются друг на друга, формируя сеть пересечений.', arts:[] },
  metaphysics:{ title:'метафизика повседневности', vec:'assets/moth_circle.png', desc:'В этом разделе исследуется скрытое измерение обыденного.\nКаждый предмет, жест, взгляд несёт в себе след более глубоких структур.', arts:[] },
  digital:{ title:'цифровые работы', vec:'assets/dragons.png', desc:'Цифровые практики как расширение традиционных. Инструмент меняется — вопрос остаётся прежним.', arts:[] },
  jewelry:{ title:'ювелирные изделия', vec:null, desc:'Ювелирное ремесло как форма концептуального высказывания.', arts:[] }
};
const PG = {
  bio:{ title:'bio', text:'Александр Вечеров — художник, работающий на пересечении концептуального реализма и сюрреализма. Основные медиумы: живопись, графика, ленд-арт, керамическая скульптура, ювелирное ремесло и текстиль.\n\nРодился и работает в России. Исследует структуру жизни, принципы её организации и механизмы роста систем.\n\nУчастник выставок. Работы находятся в частных коллекциях.' },
  statement:{ title:'artist statement', text:'Я работаю в жанре концептуального реализма с элементами сюрреализма. Этот подход представляется мне наиболее точным инструментом для акцентирования внимания на скрытых механизмах и мистических проявлениях реальности.\n\nТрадиционные техники и материалы привлекают меня своей каноничностью, поскольку позволяют говорить о фундаментальных процессах, опираясь на доступные для восприятия образы.\n\nВ своём творчестве я исследую структуру жизни и принципы её организации. Меня занимает то, как жизнь, эволюционируя, формирует ризоматические узлы.\n\nРабота начинается с идеи, фиксируется в эскизе и продолжается через многократный поиск композиционных решений.\n\nЯ воспринимаю художественную практику как способ фиксации и исследования невидимых связей, формирующих наше существование.' }
};

let cur=null, descOpen=false, rev=false, lbArr=[], lbI=0;

const show = id => {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
};

/* ── HOME PHOTO ── */
document.getElementById('inp-home').addEventListener('change', function() {
  const f = this.files[0]; if (!f) return;
  const url = URL.createObjectURL(f);
  const bg = document.getElementById('home-bg');
  document.getElementById('home-ph').style.display = 'none';
  let img = bg.querySelector('img');
  if (!img) { img = document.createElement('img'); bg.prepend(img); }
  img.src = url;
  document.getElementById('sec-bg-img').style.backgroundImage = `url('${url}')`;
});

/* ── MENU ── */
const mOv = document.getElementById('menu-ov');
document.getElementById('btn-menu').addEventListener('click', () => mOv.classList.add('open'));

// закрыть: клик вне панели
document.getElementById('menu-dismiss').addEventListener('click', e => {
  if (!e.target.closest('.menu-panel')) mOv.classList.remove('open');
});

// закрыть: свайп вправо по панели
const panel = document.getElementById('menu-panel');
let swipeX = null;
panel.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, { passive:true });
panel.addEventListener('touchend', e => {
  if (swipeX === null) return;
  if (e.changedTouches[0].clientX - swipeX > 60) mOv.classList.remove('open');
  swipeX = null;
}, { passive:true });

document.querySelectorAll('.menu-item').forEach(el => el.addEventListener('click', () => {
  mOv.classList.remove('open');
  setTimeout(() => openSec(el.dataset.sec), 80);
}));
document.querySelectorAll('.menu-sub').forEach(el => el.addEventListener('click', () => {
  mOv.classList.remove('open');
  setTimeout(() => openPg(el.dataset.page), 80);
}));

/* ── SECTION ── */
function openSec(key) {
  cur = key; descOpen = false; rev = false;
  const s = SEC[key];

  document.getElementById('sec-titleBtn').textContent = s.title;
  document.getElementById('sec-back').textContent = window.innerWidth <= 768 ? '<' : '< назад';

  // вектор в шторке описания
  const vec = document.getElementById('sec-desc-vec');
  if (s.vec) { vec.src = s.vec; vec.style.display = 'block'; }
  else { vec.style.display = 'none'; }

  // фон
  const fi = s.arts[0]?.images[0];
  if (fi) document.getElementById('sec-bg-img').style.backgroundImage = `url('${fi}')`;

  // текст описания
  document.getElementById('sec-desc-text').innerHTML =
    s.desc.split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');

  document.getElementById('sec-desc').classList.remove('open');
  document.getElementById('sec-scroll').classList.remove('dopen');
  document.getElementById('sec-chrono').classList.remove('on');
  document.getElementById('sec-chrono-m').classList.remove('on');

  renderArts();
  show('section');
}

window.addEventListener('resize', () => {
  if (cur) document.getElementById('sec-back').textContent = window.innerWidth <= 768 ? '<' : '< назад';
});

function toggleDesc() {
  descOpen = !descOpen;
  document.getElementById('sec-desc').classList.toggle('open', descOpen);
  document.getElementById('sec-scroll').classList.toggle('dopen', descOpen && window.innerWidth > 768);
}
document.getElementById('sec-titleBtn').addEventListener('click', toggleDesc);
document.getElementById('desc-close').addEventListener('click', () => {
  descOpen = false;
  document.getElementById('sec-desc').classList.remove('open');
  document.getElementById('sec-scroll').classList.remove('dopen');
});

// свайп вниз — закрыть описание
let dsY = null;
document.getElementById('sec-desc').addEventListener('touchstart', e => { dsY = e.touches[0].clientY; }, {passive:true});
document.getElementById('sec-desc').addEventListener('touchend', e => {
  if (dsY === null) return;
  if (e.changedTouches[0].clientY - dsY > 50) {
    descOpen = false;
    document.getElementById('sec-desc').classList.remove('open');
    document.getElementById('sec-scroll').classList.remove('dopen');
  }
  dsY = null;
}, {passive:true});

function togChrono() {
  rev = !rev;
  document.getElementById('sec-chrono').classList.toggle('on', rev);
  document.getElementById('sec-chrono-m').classList.toggle('on', rev);
  renderArts();
}
document.getElementById('sec-chrono').addEventListener('click', togChrono);
document.getElementById('sec-chrono-m').addEventListener('click', togChrono);
document.getElementById('sec-back').addEventListener('click', () => show('home'));

/* artwork upload */
document.getElementById('inp-art').addEventListener('change', function() {
  if (!cur) return;
  Array.from(this.files).forEach(f => {
    SEC[cur].arts.push({ images:[URL.createObjectURL(f)], title:null, material:null, size:null, year:null, price:null });
  });
  renderArts();
  const fi = SEC[cur].arts[0]?.images[0];
  if (fi) document.getElementById('sec-bg-img').style.backgroundImage = `url('${fi}')`;
  this.value = '';
});

function renderArts() {
  const arr = rev ? [...SEC[cur].arts].reverse() : SEC[cur].arts;
  const list = document.getElementById('art-list'); list.innerHTML = '';
  arr.forEach(art => {
    const card = document.createElement('div'); card.className = 'art-card';
    if (art.images?.length) {
      const img = document.createElement('img');
      img.src = art.images[0]; img.className = 'art-img'; img.alt = '';
      img.addEventListener('click', () => openLB(art.images, 0));
      card.appendChild(img);
    }
    const add = (cls, content, html) => {
      if (!content && !html) return;
      const e = document.createElement('div'); e.className = cls;
      html ? (e.innerHTML = html) : (e.textContent = content);
      card.appendChild(e);
    };
    add('art-title', art.title);
    if (art.material || art.size) {
      let h = ''; if (art.material) h += art.material; if (art.size) h += (art.material?'<br>':'')+art.size;
      add('art-mat', null, h);
    }
    add('art-year', art.year);
    add('art-price', art.price);
    list.appendChild(card);
  });
}

/* ── TEXT ── */
function openPg(key) {
  const p = PG[key];
  document.getElementById('text-ttl').textContent = p.title;
  document.getElementById('text-body').innerHTML = p.text.split('\n\n').map(t=>`<p>${t}</p>`).join('');
  show('text');
}
document.getElementById('text-back').addEventListener('click', () => show('home'));

/* ── LIGHTBOX ── */
function openLB(imgs, idx) {
  lbArr = imgs; lbI = idx;
  const tr = document.getElementById('lb-track'); tr.innerHTML = '';
  imgs.forEach(src => { const s=document.createElement('div'); s.className='lb-slide'; const i=document.createElement('img'); i.src=src; s.appendChild(i); tr.appendChild(s); });
  const dots = document.getElementById('lb-dots'); dots.innerHTML = '';
  if (imgs.length>1) imgs.forEach((_,i) => { const d=document.createElement('div'); d.className='lb-dot'+(i===0?' on':''); d.addEventListener('click',()=>goLB(i)); dots.appendChild(d); });
  document.getElementById('lb-prv').style.display = imgs.length>1?'':'none';
  document.getElementById('lb-nxt').style.display = imgs.length>1?'':'none';
  updLB();
  document.getElementById('lb').classList.add('open');
}
const closeLB = () => document.getElementById('lb').classList.remove('open');
function goLB(i) { lbI=Math.max(0,Math.min(i,lbArr.length-1)); updLB(); }
function updLB() {
  const sl = document.querySelectorAll('.lb-slide'); if (!sl.length) return;
  const w = sl[0].offsetWidth||(window.innerWidth-80);
  document.getElementById('lb-track').style.transform = `translateX(${-lbI*w}px)`;
  document.querySelectorAll('.lb-dot').forEach((d,i)=>d.classList.toggle('on',i===lbI));
}
document.getElementById('lb-bg').addEventListener('click', closeLB);
document.getElementById('lb-prv').addEventListener('click', e=>{e.stopPropagation();goLB(lbI-1);});
document.getElementById('lb-nxt').addEventListener('click', e=>{e.stopPropagation();goLB(lbI+1);});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key==='ArrowLeft') goLB(lbI-1); if (e.key==='ArrowRight') goLB(lbI+1); if (e.key==='Escape') closeLB();
});
let ltx=null;
document.getElementById('lb-stage').addEventListener('touchstart',e=>{ltx=e.touches[0].clientX;},{passive:true});
document.getElementById('lb-stage').addEventListener('touchend',e=>{
  if(ltx===null)return; const dx=e.changedTouches[0].clientX-ltx; if(Math.abs(dx)>40) dx<0?goLB(lbI+1):goLB(lbI-1); ltx=null;
},{passive:true});

/* ── PINCH ZOOM ── */
(function(){
  let el=null,sc=1,px=0,py=0,ld=0,lx=0,ly=0,lt=0;
  const rst=()=>{if(!el)return;el.style.transform='';el.style.zIndex='';el.style.position='';el=null;sc=1;px=0;py=0;};
  document.addEventListener('touchstart',e=>{
    if(window.innerWidth>768)return;
    const t=e.target.closest('.art-img');if(!t)return;
    if(e.touches.length===2){el=t;ld=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);}
    if(e.touches.length===1){lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
    const now=Date.now();if(now-lt<280&&sc>1)rst();lt=now;
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!el)return;
    if(e.touches.length===2){e.preventDefault();const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);sc=Math.max(1,Math.min(sc*(d/ld),4));ld=d;}
    else if(e.touches.length===1&&sc>1){e.preventDefault();px+=e.touches[0].clientX-lx;py+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
    el.style.transform=`scale(${sc}) translate(${px/sc}px,${py/sc}px)`;el.style.transformOrigin='center center';el.style.position='relative';el.style.zIndex='30';
  },{passive:false});
  document.addEventListener('touchend',e=>{if(!el)return;if(e.touches.length===0&&sc<=1.05)rst();},{passive:true});
})();

show('home');
</script>
