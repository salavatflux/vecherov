<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0a0a; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; color:#fff; -webkit-font-smoothing:antialiased; touch-action:pan-x pan-y; }
button { background:none; border:none; cursor:pointer; font-family:inherit; color:inherit; }
a { color:inherit; text-decoration:none; }
img { display:block; max-width:100%; }

.view { position:fixed; inset:0; display:none; }
.view.active { display:flex; flex-direction:column; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#view-section.active, #view-text.active { animation:fadeIn .5s ease both; }

/* ── HOME ── */
#view-home { overflow:hidden; }
.home-bg { position:absolute; inset:0; background:#111; }
.home-bg img { width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .6s ease; }
.home-bg img.loaded { opacity:1; }
.home-ph { display:none; }
.home-ui { position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; }
.home-top { display:flex; justify-content:space-between; align-items:flex-start; padding:28px 32px; }
.artist-name { font-size:clamp(16px,1.8vw,24px); font-weight:300; letter-spacing:.22em; line-height:1.3; text-transform:uppercase; }
.dots-btn { display:flex; flex-direction:column; gap:5px; padding:2px; }
.dots-btn span { display:block; width:4px; height:4px; background:#fff; }

/* ── MENU ── */
.menu-ov { position:fixed; inset:0; z-index:200; pointer-events:none; }
.menu-ov.open { pointer-events:all; }
.menu-dismiss { position:absolute; inset:0; background:rgba(0,0,0,0); transition:background .7s; }
.menu-ov.open .menu-dismiss { background:rgba(0,0,0,.3); }
.menu-panel {
  position:absolute; top:0; right:0; bottom:0;
  width:clamp(280px,32vw,420px);
  display:flex; flex-direction:column;
  padding:52px 48px 48px 40px;
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  background:rgba(0,0,0,.73);
  transform:translateX(100%);
  transition:transform .7s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.menu-ov.open .menu-panel { transform:translateX(0); }
.menu-panel.no-anim { transition:none!important; }
@keyframes menuIn { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }
.menu-ov.open .menu-item:nth-child(1){animation:menuIn .6s .08s both}
.menu-ov.open .menu-item:nth-child(2){animation:menuIn .6s .15s both}
.menu-ov.open .menu-item:nth-child(3){animation:menuIn .6s .22s both}
.menu-ov.open .menu-item:nth-child(4){animation:menuIn .6s .29s both}
.menu-ov.open .menu-item:nth-child(5){animation:menuIn .6s .36s both}
.menu-ov.open .menu-item:nth-child(6){animation:menuIn .6s .43s both}
.menu-ov.open .menu-line{animation:menuIn .6s .48s both}
.menu-ov.open .menu-sub:nth-child(1){animation:menuIn .6s .53s both}
.menu-ov.open .menu-sub:nth-child(2){animation:menuIn .6s .58s both}
.menu-ov.open .menu-icons{animation:menuIn .6s .63s both}
.menu-nav { flex:1; display:flex; flex-direction:column; justify-content:flex-start; align-items:flex-end; }
.menu-item { font-size:clamp(16px,1.8vw,22px); font-weight:300; letter-spacing:.3em; text-transform:lowercase; text-align:right; padding:16px 0; line-height:1.3; cursor:pointer; transition:opacity .2s; width:100%; }
.menu-item:hover { opacity:.5; }
.menu-line { height:1px; background:rgba(255,255,255,.15); width:25%; margin:12px 0 12px auto; }
.menu-sub { font-size:clamp(16px,1.8vw,22px); font-weight:100; letter-spacing:.3em; text-transform:lowercase; text-align:right; padding:16px 0; cursor:pointer; transition:opacity .2s; width:100%; }
.menu-sub:hover { opacity:.5; }
.menu-icons { display:flex; justify-content:flex-end; gap:22px; margin-top:auto; padding-top:32px; }
.menu-icons a { opacity:.65; transition:opacity .2s; color:#fff; display:flex; }
.menu-icons a:hover { opacity:1; }
.menu-icons svg { width:22px; height:22px; }
@media(max-width:768px){ .menu-panel{width:100%;padding:52px 32px 44px} }

/* ── SECTION ── */
#view-section { background:#0a0a0a; overflow:hidden; }
.sec-bg { position:absolute; inset:0; z-index:0; overflow:hidden; background:#0a0a0a; }
.sec-bg-img { position:absolute; inset:-5%; background-size:cover; background-position:center; filter:blur(20px); transform:scale(1.1); opacity:0; transition:opacity .5s; }
.sec-bg-img.loaded { opacity:1; }
.sec-bg-dim { position:absolute; inset:0; background:rgba(0,0,0,.75); }

/*
  Топбар — на мобиле overflow:hidden чтобы обрезать вектор снизу.
  На десктопе без overflow — кнопки не перекрыты.
*/
.sec-topbar {
  position:relative; z-index:20; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 36px;
}
@media(max-width:768px){ .sec-topbar{ padding:16px 20px; overflow:hidden; } }

/*
  Вектор:
  Desktop — position:absolute в .sec-scroll (z-index:1, под картинками z-index:2).
            Левый и верхний края выходят за пределы на 10%.
            Ширина 20vw. Не обрезается, не наезжает на кнопки.
  Mobile  — position:absolute в .sec-topbar.
            Ширина 50vw. Обрезается нижним краем топбара (overflow:hidden).
            При открытом описании нижняя часть выезжает вместе с .sec-desc (order:-1).
*/
.sec-vec {
  position:absolute;
  left:0; top:0;
  pointer-events:none;
  opacity:.1;
  transition:opacity .4s;
  z-index:1;
}
.sec-vec.show { opacity:.9; }

/* Desktop: вектор живёт в sec-scroll */
@media(min-width:769px){
  .sec-vec { width:20vw; height:auto; }
}
/* Mobile: вектор живёт в sec-topbar, обрезается overflow:hidden снизу */
@media(max-width:768px){
  .sec-vec { width:45vw; height:auto; left:-5%; }
}

.sec-back { position:relative; z-index:1; font-size:clamp(12px,1vw,15px); font-weight:500; letter-spacing:.06em; white-space:nowrap; flex-shrink:0; }
.sec-right { position:relative; z-index:1; display:flex; align-items:center; gap:28px; flex-shrink:0; }
.sec-chrono { font-size:clamp(11px,.95vw,13px); font-weight:300; letter-spacing:.3em; text-transform:lowercase; transition:opacity .2s; }
.sec-chrono:hover, .sec-chrono.on { opacity:.45; }
.sec-title-btn { font-size:clamp(11px,.95vw,13px); font-weight:700; letter-spacing:.3em; text-transform:lowercase; transition:opacity .2s; }
.sec-title-btn:hover { opacity:.7; }

.chrono-row { display:none; position:relative; z-index:20; flex-shrink:0; justify-content:flex-end; padding:0 20px 8px; }
@media(max-width:768px){ .sec-topbar .sec-chrono{display:none} .chrono-row{display:flex!important} }

/* Body */
.sec-body { flex:1; display:flex; min-height:0; position:relative; z-index:10; }

/* Scroll */
.sec-scroll { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:16px 36px 80px; position:relative; }
@media(max-width:768px){ .sec-scroll{padding:12px 20px 80px} }

/* Описание — desktop: выезжает справа */
.sec-desc {
  flex-shrink:0; overflow:hidden;
  width:clamp(260px,32vw,400px);
  transform:translateX(100%);
  transition:transform .4s ease-out;
  will-change:transform;
  z-index:15;
}
.sec-desc.open { transform:translateX(0); }
.sec-desc-inner { width:clamp(260px,32vw,400px); height:100%; overflow-y:auto; padding:20px 24px 24px 20px; -webkit-overflow-scrolling:touch; }
.sec-desc-inner p { font-size:9pt; font-weight:300; letter-spacing:.08em; line-height:1.75; color:rgba(255,255,255,.85); text-align:justify; }
.sec-desc-inner p+p { margin-top:10px; }

/* Mobile: описание выезжает вниз из топбара */
@media(max-width:768px){
  .sec-body { flex-direction:column; overflow:hidden; }
  .sec-desc {
    position:relative; width:100%!important;
    transform:none; max-height:0; overflow:hidden;
    transition:max-height .45s ease-out;
    order:-1; z-index:20;
    flex-shrink:0;
  }
  .sec-desc.open { max-height:60vh; }
  .sec-desc-inner { width:100%; height:auto; max-height:60vh; padding:16px 20px 16px; }
}
.desc-close-mob { display:none; width:100%; text-align:center; padding:6px 0; cursor:pointer; font-size:18px; color:rgba(255,255,255,.3); flex-shrink:0; }
@media(max-width:768px){ .desc-close-mob{display:block} }

/* Область справа (закрытое описание) — прозрачный оверлей для скролла ленты */
.sec-desc-proxy {
  display:none;
  position:absolute; top:0; right:0; bottom:0;
  width:clamp(260px,32vw,400px);
  z-index:14; cursor:default;
}
/* показываем только на десктопе когда описание закрыто */
@media(min-width:769px){ .sec-desc-proxy.active { display:block; } }

/* Artwork */
.art-card { margin-top:32px; position:relative; z-index:2; }
/* Враппер для pinch-zoom — overflow:hidden + isolation обрезают трансформированный img во всех браузерах */
.art-zoom-wrap { overflow:hidden; width:100%; line-height:0; isolation:isolate; }
.art-thumb { width:100%; height:auto; display:block; cursor:pointer; }
.art-info { margin-top:16px; }
.art-title { font-size:clamp(18px,1.8vw,26px); font-weight:400; letter-spacing:.1em; color:#eef3f6; line-height:1.3; }
.art-mat { margin-top:10px; font-size:clamp(10px,.85vw,12px); font-weight:400; letter-spacing:.1em; color:#9b9b9b; line-height:1.4; }
.art-year { margin-top:5px; font-size:clamp(10px,.85vw,12px); font-weight:400; letter-spacing:.1em; color:#9b9b9b; }
.art-price { margin-top:14px; font-size:clamp(14px,1.3vw,18px); font-weight:400; letter-spacing:.06em; color:#555; }

/* ── TEXT VIEW (bio / statement) ── */
#view-text { background:#0a0a0a; overflow:hidden; }
.text-bg { position:absolute; inset:0; z-index:0; overflow:hidden; background:#0a0a0a; }
.text-bg-img { position:absolute; inset:-5%; background-size:cover; background-position:center; filter:blur(20px); transform:scale(1.1); opacity:0; transition:opacity .5s; }
.text-bg-img.loaded { opacity:1; }
.text-bg-dim { position:absolute; inset:0; background:rgba(0,0,0,.75); }
.text-top { position:relative; z-index:1; flex-shrink:0; display:flex; align-items:baseline; justify-content:space-between; padding:28px 48px; }
.text-ttl { font-size:clamp(13px,1.1vw,16px); font-weight:300; letter-spacing:.3em; text-transform:lowercase; }
.text-body { position:relative; z-index:1; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:36px 10vw 60px; min-height:0; }
/* Абзацы в обычных страницах */
.text-body p {
  font-size:clamp(14px,1.1vw,16px); font-weight:300; letter-spacing:.05em;
  line-height:1.9; color:rgba(255,255,255,.88); text-align:justify;
  text-indent:2em; margin-bottom:.5em;
}
/* CV — особый тип страницы */
.cv-section { margin-bottom:32px; }
.cv-section-title {
  font-size:clamp(14px,1.1vw,16px); font-weight:500; letter-spacing:.12em;
  text-transform:uppercase; color:rgba(255,255,255,.9);
  margin-bottom:12px;
}
.cv-section-text {
  font-size:clamp(13px,1vw,15px); font-weight:400; letter-spacing:.04em;
  line-height:1.85; color:rgba(255,255,255,.75);
}
.cv-section-text p { margin-bottom:.4em; }
@media(max-width:768px){ .text-top{padding:20px 24px} .text-body{padding:24px 24px 60px} }

/* ── LIGHTBOX ── */
.lb { position:fixed; inset:0; z-index:500; display:none; align-items:center; justify-content:center; }
.lb.open { display:flex; }
/* Фон — полный клик закрывает */
.lb-bg { position:absolute; inset:0; cursor:pointer; backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); background:rgba(0,0,0,.88); }
.lb-stage { position:relative; z-index:1; width:100%; max-width:calc(100vw - 80px); }
/* overflow:hidden на stage — чтобы слайды не торчали */
.lb-viewport { overflow:hidden; width:100%; }
.lb-track { display:flex; transition:transform .35s ease; will-change:transform; }
.lb-slide { flex:0 0 100%; width:100%; display:flex; align-items:center; justify-content:center; padding:0 4px; }
.lb-slide img { max-width:100%; max-height:calc(100vh - 120px); object-fit:contain; pointer-events:none; user-select:none; display:block; }
.lb-arr {
  position:absolute; top:50%; transform:translateY(-50%);
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,255,255,.12); font-size:24px;
  display:flex; align-items:center; justify-content:center;
  z-index:2; transition:background .2s; cursor:pointer;
}
.lb-arr:hover { background:rgba(255,255,255,.28); }
.lb-prv { left:-56px; } .lb-nxt { right:-56px; }
@media(max-width:768px){ .lb-stage{max-width:calc(100vw - 48px)} .lb-prv{left:-28px} .lb-nxt{right:-28px} }
.lb-dots { position:absolute; bottom:-32px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
.lb-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.3); cursor:pointer; transition:background .2s; }
.lb-dot.on { background:rgba(255,255,255,.9); }
.lb-counter { position:absolute; top:-28px; right:0; font-size:10px; font-weight:300; letter-spacing:.2em; color:rgba(255,255,255,.4); }

::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); }
</style>
</head>

/* ── PINCH ZOOM на фото в ленте ──
   transform-origin зафиксирован 50% 50%. Масштаб от центра, пан одним пальцем.
   clampPan не даёт картинке уйти за края .art-zoom-wrap.
   Сброс при скролле ленты или сведении пальцев к sc=1. */
(function(){
  let el=null, wrap=null, sc=1, px=0, py=0, ld=0, lx=0, ly=0, pinching=false;

  function clampPan() {
    if (!wrap) return;
    const maxX = wrap.offsetWidth  * (sc - 1) / (2 * sc);
    const maxY = wrap.offsetHeight * (sc - 1) / (2 * sc);
    px = Math.max(-maxX, Math.min(maxX, px));
    py = Math.max(-maxY, Math.min(maxY, py));
  }

  function applyTransform() {
    if (!el) return;
    clampPan();
    el.style.transform = `scale(${sc}) translate(${px}px,${py}px)`;
  }

  function rst() {
    if (!el) return;
    el.style.transition = 'transform .25s ease';
    el.style.transform = 'scale(1) translate(0,0)';
    const _el = el;
    el = null; wrap = null; sc = 1; px = 0; py = 0; pinching = false; lx = 0; ly = 0;
    setTimeout(() => { _el.style.transition = ''; }, 260);
  }

  document.getElementById('sec-scroll').addEventListener('scroll', rst, {passive:true});
  /* Сброс зума при касании вне картинки (начало скролла ленты) */
  document.getElementById('sec-scroll').addEventListener('touchstart', e => {
    if (el && !e.target.closest('.art-thumb')) rst();
  }, {passive:true});

  document.addEventListener('touchstart', e => {
    if (document.getElementById('lb').classList.contains('open')) return;
    const t = e.target.closest('.art-thumb');
    if (!t) return;

    if (e.touches.length === 2) {
      if (el && el !== t) rst();
      pinching = true;
      el = t; wrap = t.parentElement;
      t.style.transition = '';
      t.style.transformOrigin = '50% 50%';
      ld = Math.hypot(
        e.touches[1].clientX - e.touches[0].clientX,
        e.touches[1].clientY - e.touches[0].clientY
      );
    }

    if (e.touches.length === 1) {
      if (!el) { el = t; wrap = t.parentElement; }
      if (sc > 1) {
        t.style.transition = '';
        lx = e.touches[0].clientX;
        ly = e.touches[0].clientY;
      }
    }
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    if (!el) return;
    if (e.touches.length === 2 && pinching) {
      e.preventDefault();
      const d = Math.hypot(
        e.touches[1].clientX - e.touches[0].clientX,
        e.touches[1].clientY - e.touches[0].clientY
      );
      sc = Math.max(1, Math.min(sc * (d / ld), 4));
      ld = d;
      applyTransform();
    } else if (e.touches.length === 1 && sc > 1) {
      e.preventDefault();
      px += (e.touches[0].clientX - lx) / sc;
      py += (e.touches[0].clientY - ly) / sc;
      lx = e.touches[0].clientX;
      ly = e.touches[0].clientY;
      applyTransform();
    }
  }, {passive:false});

  document.addEventListener('touchend', e => {
    if (e.touches.length < 2) pinching = false;
    if (e.touches.length === 0) {
      if (sc <= 1.05) rst();
      else { lx = 0; ly = 0; }
    }
  }, {passive:true});
})();

/* ── WHEEL ZOOM на фото (десктоп) ── */
(function(){
  document.getElementById('sec-scroll').addEventListener('wheel', e=>{
    const t = e.target.closest('.art-thumb');
    if (!t) return;
    e.preventDefault();
    const wrap = t.parentElement;
    let sc = parseFloat(t.dataset.sc||1);
    sc = Math.max(1, Math.min(sc * (e.deltaY < 0 ? 1.1 : 0.9), 4));
    t.dataset.sc = sc;
    let px = parseFloat(t.dataset.px||0);
    let py = parseFloat(t.dataset.py||0);
    if (sc === 1) { px = 0; py = 0; }
    const maxX = wrap.offsetWidth  * (sc - 1) / (2 * sc);
    const maxY = wrap.offsetHeight * (sc - 1) / (2 * sc);
    px = Math.max(-maxX, Math.min(maxX, px));
    py = Math.max(-maxY, Math.min(maxY, py));
    t.dataset.px = px; t.dataset.py = py;
    t.style.transform = sc > 1 ? `scale(${sc}) translate(${px}px,${py}px)` : '';
  }, {passive:false});

  let dragging=null, dEl=null, dWrap=null, dLx=0, dLy=0;
  document.getElementById('sec-scroll').addEventListener('mousedown', e=>{
    const t = e.target.closest('.art-thumb');
    if (!t || parseFloat(t.dataset.sc||1) <= 1) return;
    e.preventDefault();
    dragging=true; dEl=t; dWrap=t.parentElement; dLx=e.clientX; dLy=e.clientY;
  });
  document.addEventListener('mousemove', e=>{
    if (!dragging||!dEl) return;
    const sc = parseFloat(dEl.dataset.sc||1);
    let px = parseFloat(dEl.dataset.px||0) + (e.clientX-dLx)/sc;
    let py = parseFloat(dEl.dataset.py||0) + (e.clientY-dLy)/sc;
    dLx=e.clientX; dLy=e.clientY;
    const maxX = dWrap.offsetWidth  * (sc-1) / (2*sc);
    const maxY = dWrap.offsetHeight * (sc-1) / (2*sc);
    px = Math.max(-maxX, Math.min(maxX, px));
    py = Math.max(-maxY, Math.min(maxY, py));
    dEl.dataset.px=px; dEl.dataset.py=py;
    dEl.style.transform = `scale(${sc}) translate(${px}px,${py}px)`;
  });
  document.addEventListener('mouseup', ()=>{ dragging=false; dEl=null; dWrap=null; });
})();

      Object.assign(STATE,saved);
      if(STATE.artistName)
        document.getElementById('artist-name-el').innerHTML=STATE.artistName.replace('\n','<br>');
      if(STATE.homePhoto){
        document.getElementById('home-ph').style.display='none';
        const bg=document.getElementById('home-bg');
        let img=bg.querySelector('img');
        if(!img){img=document.createElement('img');bg.prepend(img);}
        img.onload=()=>img.classList.add('loaded');
        img.src=STATE.homePhoto.replace('/upload/','/upload/q_auto,f_auto,w_1200/');
        document.getElementById('sec-bg-img').style.backgroundImage=`url('${STATE.homePhoto.replace('/upload/','/upload/q_auto,f_auto,w_1200/')}')`;
        document.getElementById('sec-bg-img').classList.add('loaded');
      }
      renderMenu();
    }
  }catch(e){ console.warn('Supabase:',e); }
}

renderMenu();
show('home');
loadStateFromSupabase();

document.addEventListener('touchstart', e=>{
  if(e.touches.length>1 && !e.target.closest('.art-zoom-wrap')){
    e.preventDefault();
  }
},{passive:false});
</script>
</body>
</html>
